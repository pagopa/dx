name: Publish DX Metrics Import Job Image

on:
  workflow_dispatch:
  push:
    # Publish the image only after this project's Nx release tag exists.
    tags:
      - "dx-metrics-import@*"

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  publish:
    name: Build and Publish Import Job Image
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-cd
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Docker Build and Push
        uses: pagopa/dx/actions/docker-build-push@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dockerfile_path: ./apps/dx-metrics-import/Dockerfile
          dockerfile_context: .
          docker_image_name: pagopa/dx-metrics-import
          docker_image_description: "Scheduled import job for the DX Metrics portal. Fetches GitHub engineering metrics and writes them to PostgreSQL."
          docker_image_authors: PagoPA
          build_platforms: linux/amd64
          push_to_registry: true
