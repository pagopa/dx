name: Deploy DX Metrics Container App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional released DX Metrics image version to deploy
        required: false
        type: string
  push:
    # Scope production deployment to the Nx release tag for this project.
    tags:
      - "dx-metrics@*"

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  deploy:
    name: Deploy DX Metrics as Container App
    concurrency:
      group: ${{ github.workflow }}-cd
      # Override this configuration to prevent cancelling a running deploy.
      cancel-in-progress: false
    uses: ./.github/workflows/release-azure-containerapp-v1.yaml
    secrets: inherit
    with:
      dockerfile_path: ./apps/dx-metrics/Dockerfile
      dockerfile_context: .
      docker_image_name: pagopa/dx-metrics
      docker_image_tag: ${{ github.event_name == 'push' && github.ref_name || inputs.image_tag }}
      container_app: dx-p-itn-metrics-portal-ca-01
      resource_group_name: dx-p-itn-common-rg-01
      environment: app-prod
