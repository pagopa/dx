name: Bootstrapper Apply

on:
  workflow_call:
    inputs:
      environment:
        description: Environment where the resources will be deployed.
        type: string
        required: true

env:
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  ROLE_ARN: ${{ secrets.ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_IN_AUTOMATION: true

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: bootstrapper-${{ inputs.environment }}-cd
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.environment }}-bootstrapper
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        name: Checkout

      - name: Get terraform version from .terraform-version file
        id: get-version
        uses: pagopa/dx/.github/actions/get-terraform-version@main

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Terraform Setup
        uses: pagopa/dx/.github/actions/terraform-setup@main
        with:
          terraform_version: ${{ steps.get-version.outputs.terraform_version }}

      - name: Terraform Init
        working-directory: infra/bootstrapper/${{ inputs.environment }}
        run: |
          terraform init -input=false
      - name: Create GitHub App token
        id: github-app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_KEY }}

      - name: Verify GitHub App installation
        env:
          ACTUAL_INSTALLATION_ID: ${{ steps.github-app-token.outputs.installation-id }}
          EXPECTED_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
        run: |
          set -euo pipefail
          if [ "$ACTUAL_INSTALLATION_ID" != "$EXPECTED_INSTALLATION_ID" ]; then
            echo "::error::Resolved GitHub App installation ID does not match GH_APP_INSTALLATION_ID."
            exit 1
          fi

      - name: Terraform Apply
        working-directory: infra/bootstrapper/${{ inputs.environment }}
        env:
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          set -o pipefail
          terraform apply -auto-approve -input=false
