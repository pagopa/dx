name: Nx Release - Create PR

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v1.yaml
    with:
      environment: npm-prod-cd
      mode: create-pr
    secrets:
      github-token: ${{ secrets.BOT_GH_TOKEN }}
