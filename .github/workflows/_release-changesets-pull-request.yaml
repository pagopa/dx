name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v2.yaml
    with:
      environment: npm-prod-cd
    secrets:
      app-client-id: ${{ secrets.GH_RELEASE_CLIENT_ID }}
      app-private-key: ${{ secrets.GH_RELEASE_APP_KEY }}
