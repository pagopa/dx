name: Deploy Static Site to Azure

# This reusable workflow builds a static application from a monorepo workspace,
# uploads the assets to an Azure Static Web App, and deploys them.
# It is designed to be called by other workflows.

# NOTE: example caller trigger for the tag-based release pattern used in this repository
# on:
#   push:
#     tags:
#       - "my-static-app@*"
#   pull_request:
#     types: [opened, synchronize, reopened, closed]
#     branches:
#       - main
#     paths:
#       - "apps/my-static-app/**"
# This reusable workflow is still invoked via `workflow_call`; the snippet above
# only documents a possible caller pattern for production tags
# and pull request previews.
# At runtime the workflow behavior stays generic: `pull_request` events target
# preview environments, while any other caller event follows the production path.
# The Azure deploy step omits `deployment_environment` for production-like
# executions and uses a PR-derived name for preview environments.
# GitHub Actions does not apply path filters to tag pushes, so tag-based callers
# should scope production deploys with a project-specific tag prefix.
# Legacy push-to-main callers are still supported temporarily, but this
# compatibility will be removed in the next release.

on:
  workflow_call:
    inputs:
      workspace_name:
        description: The name of the workspace to create the artifact for.
        type: string
        required: true
      output_dir:
        description: The name of the build output directory.
        type: string
        required: false
        default: "dist"
      static_web_app_name:
        description: Azure Static Web App name where the assets will be deployed.
        type: string
        required: true
      resource_group_name:
        description: Resource group name for the Azure Static Web App.
        type: string
        required: true
      environment:
        description: Environment where the artifact will be deployed.
        type: string
        required: true
      use_private_agent:
        description: Use a private agent to deploy the built artifact.
        type: boolean
        required: false
        default: false
      use_labels:
        description: Use labels to start the right environment's GitHub runner. If use_labels is true, also use_private_agent must be set to true
        type: boolean
        required: false
        default: false
      override_labels:
        description: Needed for special cases where the environment alone is not sufficient as a distinguishing label
        type: string
        required: false
        default: ""
    outputs:
      bundle_name:
        description: The name of the bundle used for artifact storage
        value: ${{ jobs.build.outputs.bundle_name }}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'ci' || 'cd' }}
  cancel-in-progress: true

env:
  BUNDLE_NAME: bundle
  OUTPUT_DIR: ${{ inputs.output_dir }}

jobs:
  build:
    name: Build Artifact
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ${{ inputs.use_labels && inputs.use_private_agent && (inputs.override_labels != '' && inputs.override_labels || inputs.environment) || inputs.use_private_agent && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: read
    outputs:
      bundle_name: ${{ env.BUNDLE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Package
        id: build-package
        uses: pagopa/dx/.github/actions/build-workspace@main
        with:
          workspace_name: ${{ env.WORKSPACE_NAME }}
        env:
          WORKSPACE_NAME: ${{ inputs.workspace_name }}

      - name: Get Artifact path
        id: get-artifact-path
        working-directory: ${{ steps.build-package.outputs.workspace-path }}
        run: |
          echo "::debug::Packaging for static deployment"
          echo "artifact-path=$(realpath ./$OUTPUT_DIR)" >> $GITHUB_OUTPUT
        env:
          OUTPUT_DIR: ${{ env.OUTPUT_DIR }}

      - name: Upload Artifact
        uses: pagopa/dx/.github/actions/upload-artifact@main
        with:
          bundle_name: ${{ env.BUNDLE_NAME }}
          file_path: ${{ steps.get-artifact-path.outputs.artifact-path }}

  deploy:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() && !github.event.act && ((github.event_name == 'pull_request' && github.event.action == 'closed') || needs.build.result == 'success') }}
    environment: ${{ inputs.environment }}-${{ github.event_name == 'pull_request' && 'ci' || 'cd' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Artifact
        if: github.event_name != 'pull_request' || github.event.action != 'closed'
        uses: pagopa/dx/.github/actions/download-artifact@main
        with:
          bundle_name: ${{ env.BUNDLE_NAME }}
          file_path: "./${{ env.OUTPUT_DIR }}"

      - name: Prepare Close Directory
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: mkdir -p "./${{ env.OUTPUT_DIR }}"

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Find API Key
        id: find_api_key
        run: |
          api_key=$(az staticwebapp secrets list --name $STATIC_WEB_APP_NAME --resource-group $RESOURCE_GROUP_NAME | jq -r '.properties.apiKey')
          echo "::add-mask::$api_key"
          echo "api_key=$api_key" >> $GITHUB_OUTPUT
        env:
          STATIC_WEB_APP_NAME: ${{ inputs.static_web_app_name }}
          RESOURCE_GROUP_NAME: ${{ inputs.resource_group_name }}

      - name: Deploy Static Website Preview
        id: deploy-preview
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.find_api_key.outputs.api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./${{ env.OUTPUT_DIR }}"
          deployment_environment: ${{ format('PR{0}', github.event.pull_request.number) }}
          skip_app_build: true

      - name: Deploy Static Website Production
        id: deploy-production
        if: github.event_name != 'pull_request'
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.find_api_key.outputs.api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./${{ env.OUTPUT_DIR }}"
          skip_app_build: true

      - name: Preview Comments Cleanup
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && steps.deploy-preview.outcome == 'success'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              }
            );

            const botComments = comments.filter(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Azure Static Web Apps: Your stage site is ready!')
            );

            // Keep only the most recent comment, delete all others
            if (botComments.length > 1) {
              const commentsToDelete = botComments.slice(0, -1);
              for (const comment of commentsToDelete) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

      - name: Delete Preview Environment
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.find_api_key.outputs.api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          app_location: "./${{ env.OUTPUT_DIR }}"
          action: "close"
          deployment_environment: ${{ format('PR{0}', github.event.pull_request.number) }}
          skip_app_build: true
