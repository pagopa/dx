name: Nx Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'nx-release/')
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v1.yaml
    with:
      environment: npm-prod-cd
      mode: 'publish'
    secrets:
      github-token: ${{ secrets.BOT_GH_TOKEN }}

  pr:
    if: github.event.pull_request.merged != true && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v1.yaml
    with:
      environment: npm-prod-cd
      mode: 'create-pr'
    secrets:
      github-token: ${{ secrets.BOT_GH_TOKEN }}
