name: E2E GitHub Self-Hosted Runner Smoke
run-name: ${{ format('E2E GitHub Self-Hosted Runner {0}', inputs.test_id) }}

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Label used by the ephemeral self-hosted runner created by the E2E test.
        required: true
        type: string
      test_id:
        description: Unique identifier used by the E2E test to find the workflow run.
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.runner_label }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    timeout-minutes: 20
    runs-on: ${{ fromJSON(format('["self-hosted","{0}"]', inputs.runner_label)) }}

    steps:
      - name: Verify runner execution
        run: |
          set -euo pipefail
          echo "test_id=${{ inputs.test_id }}"
          echo "runner_name=${RUNNER_NAME}"
          echo "runner_os=${RUNNER_OS}"
