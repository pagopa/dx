# Validate the application Docker image for the E2E Cosmos Account - 'Network Access app' scenario.

name: Validate App for E2E Cosmos Account - Network Access

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "infra/modules/azure_cosmos_account/tests/apps/network_access/**"

permissions:
  contents: read

jobs:
  build:
    name: Build Docker Image
    uses: pagopa/dx/.github/workflows/docker_image_build.yaml@CES-438-inserire-uno-step-di-linting-nella-produzione-delle-immagini-docker
    secrets: inherit
    with:
      dockerfile_path: infra/modules/azure_cosmos_account/tests/apps/network_access/Dockerfile
      dockerfile_context: infra/modules/azure_cosmos_account/tests/apps/network_access/src
      docker_image_name: "pagopa/e2e-cosmos-network-access"
      image_description: "Web app which exposes a single endpoint to probe Azure Cosmos DB. Used for E2E tests of the Azure Cosmos DB Terraform module."
      image_authors: "PagoPA"
      build_platforms: "linux/amd64,linux/arm64"
