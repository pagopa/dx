name: "Code Review"

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  validate:
    if: ${{ github.actor != 'dx-pagopa-bot' }}
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: ./.github/workflows/validate-v2.yaml
    secrets:
      app-client-id: ${{ secrets.GH_APP_RELEASE_CLIENT_ID }}
      app-private-key: ${{ secrets.GH_APP_RELEASE_APP_KEY }}
