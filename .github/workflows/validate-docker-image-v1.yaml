on:
  workflow_call:
    inputs:
      dockerfile_path:
        type: string
        required: false
        default: "./Dockerfile"
        description: Dockerfile path
      dockerfile_context:
        type: string
        required: false
        default: "."
        description: Dockerfile build context
      docker_image_name:
        type: string
        required: false
        default: ${{ github.repository }}
        description: Docker image name, defaults to repository name
      image_description:
        type: string
        required: true
        description: A description to use as image label
      image_authors:
        type: string
        required: false
        default: PagoPA
        description: Authors names to use as image label
      build_args:
        description: List of build arguments to use for Dockerfile build, given in env=value format.
        type: string
        required: false
      build_platforms:
        type: string
        required: false
        default: linux/amd64
        description: Image runtime platform, supports multiple values

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        name: Checkout

      - name: Docker Build
        uses: pagopa/dx/actions/docker-build-push@main
        with:
          dockerfile_path: ${{ inputs.dockerfile_path }}
          dockerfile_context: ${{ inputs.dockerfile_context }}
          docker_image_name: ${{ inputs.docker_image_name }}
          docker_image_description: ${{ inputs.image_description }}
          docker_image_authors: ${{ inputs.image_authors }}
          build_args: ${{ inputs.build_args }}
          build_platforms: ${{ inputs.build_platforms }}
          push_to_registry: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Linter
        id: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        continue-on-error: true
        with:
          dockerfile: ${{ inputs.dockerfile_path }}
          output-file: ./hadolint-results.txt
          ignore: DL3059

      - name: Format Linter Results
        id: format-results
        if: always() && github.event_name == 'pull_request'
        env:
          DOCKERFILE: ${{ inputs.dockerfile_path }}
        run: |

          # Check if hadolint found any issues
          if [ ! -s ./hadolint-results.txt ]; then
            # No issues found
            cat > ./hadolint-comment.md << 'EOF'
          ## 🐳 Dockerfile Linter

          ### ✅ No issues found

          Your Dockerfile passes all linting checks!

          **Analyzed:** \`$DOCKERFILE\`
          EOF
          else
            # Issues found - format them nicely
            cat > ./hadolint-comment.md << 'EOF'
          ## 🐳 Dockerfile Linter

          ### ⚠️ Issues detected

          The following issues were found in your Dockerfile:

          <details>
          <summary>📋 View details</summary>

          ```
          EOF
            cat ./hadolint-results.txt >> ./hadolint-comment.md
            cat >> ./hadolint-comment.md << 'EOF'
          ```

          </details>

          **Analyzed:** `$DOCKERFILE`

          ---

          💡 **Tip:** Fix these issues to ensure your Docker image follows best practices. Learn more in the [Hadolint documentation](https://github.com/hadolint/hadolint).
          EOF
          fi

          # Replace the dockerfile path placeholder
          sed -i "s|\$DOCKERFILE|$DOCKERFILE|g" ./hadolint-comment.md

      - name: Post Linter Results on PR
        id: comment
        if: always() && github.event_name == 'pull_request'
        uses: pagopa/dx/actions/pr-comment@main
        with:
          comment-body-file: ./hadolint-comment.md
          search-pattern: "Dockerfile Linter"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
