on:
  workflow_call:
    inputs:
      environment:
        description: Environment where the resources will be deployed.
        type: string
        required: true
      base_path:
        description: The base path on which the script will look for Terraform projects
        type: string
        required: true
      env_vars:
        description: List of environment variables to set up, given in env=value format.
        type: string
        required: false
      use_private_agent:
        description: Use a private agent to run the Terraform plan.
        type: boolean
        required: false
        default: false
      override_github_environment:
        description: Set a value if GitHub Environment name is different than the TF
          environment folder
        type: string
        required: false
        default: ""
      use_labels:
        description: Use labels to start the right environment's GitHub runner. If
          use_labels is true, also use_private_agent must be set to true
        type: boolean
        required: false
        default: false
      override_labels:
        description: Needed for special cases where the environment alone is not
          sufficient as a distinguishing label
        type: string
        required: false
        default: ""

env:
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_STORAGE_USE_AZUREAD: true
  ROLE_ARN: ${{ secrets.ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_IN_AUTOMATION: true
  REFRESH_STATE_EVERY_SECONDS: 600 # 10 minutes

jobs:
  gate:
    # Prevent running the workflow on forked PRs
    # since it runs on self-hosted runners that may have access to sensitive data
    name: Fork PR Gate
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.evaluate.outputs.run }}
    steps:
      - name: Evaluate fork PR
        id: evaluate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          CURRENT_REPO: ${{ github.repository }}
        run: |
          # Only block forked PRs; allow all other events
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_HEAD_REPO" ] && [ "$PR_HEAD_REPO" != "$CURRENT_REPO" ]; then
            echo "Blocking forked PR from $PR_HEAD_REPO"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  get-terraform-version:
    name: Get Terraform Version
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    outputs:
      terraform_version: ${{ steps.get-version.outputs.terraform_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get terraform version from .terraform-version file
        id: get-version
        uses: pagopa/dx/.github/actions/get-terraform-version@main

  detect-projects:
    name: Detect Terraform Projects
    runs-on: ubuntu-latest
    needs: [ gate, get-terraform-version ]
    if: ${{ needs.gate.outputs.run == 'true' }}
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect Terraform projects
        id: detect
        env:
          BASE_PATH: ${{ inputs.base_path }}
          ENVIRONMENT: ${{ inputs.environment }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BASE_PATH="${BASE_PATH%/}"
          DIR="$BASE_PATH/$ENVIRONMENT"
          MODULES_DIR="$BASE_PATH/_modules"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CHANGED=$(find "$DIR" -maxdepth 2 -name '*.tf' -not -path "*/_modules/*" 2>/dev/null || true)
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- "$DIR" || true)
            MODULES_CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" -- "$MODULES_DIR" || true)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA" -- "$DIR" || true)
            MODULES_CHANGED=$(git diff --name-only "$BEFORE" "$SHA" -- "$MODULES_DIR" || true)
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ -n "${MODULES_CHANGED:-}" ]; then
            CHANGED=$(find "$DIR" -maxdepth 2 -name '*.tf' -not -path "*/_modules/*" 2>/dev/null || true)
          fi

          # The two layouts are mutually exclusive:
          # - flat:          a .tf exists directly in $DIR → $DIR is the single project root
          # - multi-project: no .tf directly in $DIR → each first-level subdir is a project root
          IS_FLAT=$(printf '%s\n' "$CHANGED" | while IFS= read -r file; do
            rel="${file#"${DIR}/"}"
            case "$rel" in
              */*) ;;                    # file in a subdir: not a flat indicator
              *.tf) echo 1; break ;;    # .tf directly in $DIR: flat project
            esac
          done)

          if [ -n "$IS_FLAT" ]; then
            MATRIX=$(jq -cn --arg d "$DIR" '[$d]')
          else
            MATRIX=$(printf '%s\n' "$CHANGED" \
              | while IFS= read -r file; do
                  [ -z "$file" ] && continue
                  rel="${file#"${DIR}/"}"
                  case "$rel" in */*)  echo "${DIR}/${rel%%/*}" ;; esac
                done \
              | sort -u \
              | jq -R . | jq -sc .)
          fi

          MATRIX=${MATRIX:-[]}
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Detected matrix: $MATRIX"

  tf-modules-check:
    uses: pagopa/dx/.github/workflows/static_analysis.yaml@main
    name: Check terraform registry modules hashes
    needs: [ gate, get-terraform-version, detect-projects ]
    if: ${{ needs.gate.outputs.run == 'true' && needs.detect-projects.outputs.matrix
      != '[]' }}
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.detect-projects.outputs.matrix) }}
    with:
      terraform_version: ${{ needs.get-terraform-version.outputs.terraform_version }}
      check_to_run: lock_modules
      folder: ${{ matrix.dir }}/
      verbose: true

  tf_plan:
    name: "Terraform Plan"
    needs: [ gate, get-terraform-version, tf-modules-check, detect-projects ]
    if: ${{ needs.gate.outputs.run == 'true' && needs.detect-projects.outputs.matrix
      != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.detect-projects.outputs.matrix) }}
    # Use inputs.override_labels if set; otherwise, fall back to inputs.environment.
    # When inputs.use_labels and inputs.use_private_agent are true, apply the selected labels.
    # Default to 'self-hosted' if inputs.use_private_agent is true, or 'ubuntu-latest' otherwise.
    runs-on: ${{ inputs.use_labels && inputs.use_private_agent &&
      (inputs.override_labels != '' && inputs.override_labels ||
      inputs.environment) || inputs.use_private_agent && 'self-hosted' ||
      'ubuntu-latest' }}
    environment: ${{ inputs.override_github_environment == '' && inputs.environment
      || inputs.override_github_environment}}-ci
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.environment }}-${{ matrix.dir }}-ci
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TF_HTTP_USERNAME: ${{ secrets.STATEGRAPH_USERNAME }}
      TF_HTTP_PASSWORD: ${{ secrets.STATEGRAPH_TOKEN }}

    steps:
      # The working directory comes from the matrix; available in ${{ steps.directory.outputs.dir }}
      - name: Set directory
        id: directory
        env:
          WORKING_DIR: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          printf "dir=%q" "$WORKING_DIR" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        name: Checkout

      - name: Set Environment Variables
        if: ${{ inputs.env_vars }}
        env:
          ENV_VARS: ${{ inputs.env_vars }}
        run: |
          set -euo pipefail
          line_number=0
          while IFS= read -r line; do
            line_number=$((line_number + 1))
            line="${line%$'\r'}"
            [ -z "$line" ] && continue

            if [[ ! "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*=.*$ ]]; then
              echo "::error title=Invalid env_vars entry::env_vars line ${line_number} must be in NAME=VALUE format with a valid environment variable name."
              exit 1
            fi

            printf '%s\n' "$line" >> "$GITHUB_ENV"
          done <<< "$ENV_VARS"

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Terraform Setup
        id: set-terraform-version
        uses: pagopa/dx/.github/actions/terraform-setup@main
        with:
          terraform_version: ${{ needs.get-terraform-version.outputs.terraform_version }}

      - name: Terraform Init
        working-directory: ${{ steps.directory.outputs.dir }}
        run: |
          terraform init -input=false

      - name: Generate Cache Key
        if: github.event_name == 'pull_request'
        id: cache-key
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKING_DIR: ${{ matrix.dir }}
        run: |
          # Get current epoch time rounded to chosen window
          DIR_SLUG=$(echo "$WORKING_DIR" | tr '/' '-')
          TIME_WINDOW=$(( $(date +%s) / $REFRESH_STATE_EVERY_SECONDS ))
          echo "cache-key=tfplan-pr${PR_NUMBER}-${DIR_SLUG}-${TIME_WINDOW}s" >> $GITHUB_OUTPUT

      # Restore PR TFPlan Cache (miss = first run or >10 minutes, hit = within 10 minutes)
      - name: Check for Cache
        if: github.event_name == 'pull_request'
        id: tfplan-pr-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ steps.directory.outputs.dir }}/.pr_plan_marker
          key: ${{ steps.cache-key.outputs.cache-key }}

      - name: Set Terraform Refresh Flag
        id: set-refresh-flag
        if: github.event_name == 'pull_request'
        working-directory: ${{ steps.directory.outputs.dir }}
        env:
          CACHE_HIT: ${{ steps.tfplan-pr-cache.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" == "true" ]; then
            echo "disable_tf_plan_refresh=true" >> $GITHUB_OUTPUT
            echo "::notice::State will NOT be refreshed"
          else
            echo "disable_tf_plan_refresh=false" >> $GITHUB_OUTPUT
            echo "::notice::State will be refreshed"

            echo "$(date)" > ./.pr_plan_marker
          fi

      - name: Terraform Plan
        id: plan
        uses: pagopa/dx/actions/filter-terraform-plan@main
        with:
          base-path: ${{ steps.directory.outputs.dir }}
          sensitive-keys: hidden-link,APPINSIGHTS_INSTRUMENTATIONKEY
          no-refresh: ${{ steps.set-refresh-flag.outputs.disable_tf_plan_refresh }}

      - name: Check Plan length
        id: check-length
        working-directory: ${{ steps.directory.outputs.dir }}
        run: |
          # If the filtered plan is too long use the summary line, otherwise use the full filtered plan
          if [ "$(wc -c < ${PLAN_FILE_PATH#"$WORKING_DIRECTORY/"})" -gt 60000 ]; then
            echo "${SUMMARY_LINE}" > plan_output.txt
            echo "COMPLETE_PLAN=false" >> $GITHUB_OUTPUT
          else
            cat "${PLAN_FILE_PATH#"$WORKING_DIRECTORY/"}" > plan_output.txt
            echo "COMPLETE_PLAN=true" >> $GITHUB_OUTPUT
          fi
        env:
          SUMMARY_LINE: ${{ steps.plan.outputs.summary_line }}
          PLAN_FILE_PATH: ${{ steps.plan.outputs.filtered_plan_path }}
          WORKING_DIRECTORY: ${{ steps.directory.outputs.dir }}

      - name: Set Plan Output
        id: set-plan-output
        if: always()
        env:
          WORKFLOW_URL: "${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}"
          OUTPUT_DIR: ${{ steps.directory.outputs.dir }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          COMPLETE_PLAN: ${{ steps.check-length.outputs.COMPLETE_PLAN }}
        working-directory: ${{ steps.directory.outputs.dir }}
        run: |
          echo "### 📖 Terraform Plan ($OUTPUT_DIR) - $PLAN_OUTCOME" > message_body.txt
          echo "<details>" >> message_body.txt
          echo "<summary>Show Plan</summary>" >> message_body.txt
          echo "" >> message_body.txt

          if [ $PLAN_OUTCOME != 'success' ]; then
            echo "Terraform plan execution failed. Check the [workflow logs]($WORKFLOW_URL) for full details." >> message_body.txt
          else
            echo "\`\`\`hcl" >> message_body.txt
            cat plan_output.txt >> message_body.txt
            echo "\`\`\`" >> message_body.txt

            if [ $COMPLETE_PLAN == 'false' ]; then
              echo "Full plan output was too long and was omitted. Check the [workflow logs]($WORKFLOW_URL) for full details." >> message_body.txt
            fi
          fi

          echo "" >> message_body.txt
          echo "</details>" >> message_body.txt

      # Post the plan output in the PR
      - name: Post Plan on PR
        id: comment
        if: always() && github.event_name == 'pull_request'
        uses: pagopa/dx/actions/pr-comment@main
        env:
          COMMENT_BODY_FILE: "${{ steps.directory.outputs.dir }}/message_body.txt"
        with:
          comment-body-file: ${{ env.COMMENT_BODY_FILE }}
          search-pattern: "Terraform Plan (${{ steps.directory.outputs.dir }})"

      # Fail the workflow if the Terraform plan failed
      - name: Check Terraform Plan Result
        if: always() && steps.plan.outcome != 'success'
        run: |
          exit 1
