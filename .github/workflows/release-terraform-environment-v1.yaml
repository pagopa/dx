name: Terraform Environment Release v1
run-name: Terraform release ${{ inputs.project }}

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Nx Terraform environment project to release"
        required: true
        type: string
      project-root:
        description: "Repository path containing the Terraform environment.json manifest"
        required: true
        type: string
      source-ref:
        description: "Git commit containing the released infrastructure configuration"
        required: true
        type: string

concurrency:
  group: infra-terraform-${{ inputs.project }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Deployment Environment
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      apply-environment: ${{ steps.release-metadata.outputs.apply-environment }}
      plan-environment: ${{ steps.release-metadata.outputs.plan-environment }}
      runner-label: ${{ steps.release-metadata.outputs.runner-label }}
      source-ref: ${{ steps.release-metadata.outputs.source-ref }}
    steps:
      - name: Validate release source and deployment metadata
        id: release-metadata
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NX_PROJECT: ${{ inputs.project }}
          PROJECT_ROOT: ${{ inputs.project-root }}
          SOURCE_REF: ${{ inputs.source-ref }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const path = require("node:path");
            const project = process.env.NX_PROJECT;
            const projectRoot = process.env.PROJECT_ROOT;
            const sourceRef = process.env.SOURCE_REF;
            const defaultBranch = context.payload.repository?.default_branch;
            const isNonEmptyString = (value) =>
              typeof value === "string" && value.trim().length > 0;

            if (!defaultBranch) {
              throw new Error("Could not resolve the repository default branch");
            }
            if (
              !isNonEmptyString(project) ||
              !isNonEmptyString(projectRoot) ||
              !isNonEmptyString(sourceRef)
            ) {
              throw new Error("Project, project root, and source ref are required");
            }
            if (!/^[0-9a-f]{40}$/i.test(sourceRef)) {
              throw new Error("source-ref must be a full Git commit SHA");
            }
            if (
              projectRoot.includes("\\") ||
              path.posix.normalize(projectRoot) !== projectRoot ||
              !projectRoot.startsWith("infra/resources/")
            ) {
              throw new Error(
                `Project root "${projectRoot}" is not a normalized Terraform environment path`
              );
            }

            const expectedProject = projectRoot
              .split("/")
              .slice(1)
              .map((part) =>
                part === "_modules" ? "modules" : part.replaceAll("_", "-")
              )
              .join("-");
            if (project !== expectedProject) {
              throw new Error(
                `Project "${project}" does not match root "${projectRoot}"`
              );
            }

            const { data: branch } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: defaultBranch,
            });
            if (!branch.protected) {
              throw new Error(
                `Default branch "${defaultBranch}" is not protected`
              );
            }

            const { data: comparison } =
              await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: sourceRef,
                head: defaultBranch,
              });
            if (!["ahead", "identical"].includes(comparison.status)) {
              throw new Error(
                `Commit "${sourceRef}" is not reachable from "${defaultBranch}"`
              );
            }

            const manifestPath = `${projectRoot}/environment.json`;
            const { data: manifestFile } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: manifestPath,
              ref: sourceRef,
            });
            if (
              Array.isArray(manifestFile) ||
              manifestFile.type !== "file" ||
              manifestFile.encoding !== "base64" ||
              !manifestFile.content
            ) {
              throw new Error(`Could not read "${manifestPath}"`);
            }

            let manifest;
            try {
              manifest = JSON.parse(
                Buffer.from(manifestFile.content, "base64").toString("utf8")
              );
            } catch (error) {
              throw new Error(`Failed to parse "${manifestPath}"`, {
                cause: error,
              });
            }

            if (
              typeof manifest !== "object" ||
              manifest === null ||
              !isNonEmptyString(manifest.version)
            ) {
              throw new Error(`Manifest "${manifestPath}" has no valid version`);
            }

            const environmentName = path.posix.basename(projectRoot);
            const deployment = manifest.deployment ?? {
              applyEnvironment: `infra-${environmentName}-cd`,
              planEnvironment: `infra-${environmentName}-ci`,
              runnerLabel: environmentName,
            };
            if (typeof deployment !== "object" || deployment === null) {
              throw new Error(
                `Manifest "${manifestPath}" has invalid deployment metadata`
              );
            }
            for (const key of [
              "applyEnvironment",
              "planEnvironment",
              "runnerLabel",
            ]) {
              if (!isNonEmptyString(deployment[key])) {
                throw new Error(
                  `Manifest "${manifestPath}" has invalid deployment.${key}`
                );
              }
            }

            core.setOutput("apply-environment", deployment.applyEnvironment);
            core.setOutput("plan-environment", deployment.planEnvironment);
            core.setOutput("runner-label", deployment.runnerLabel);
            core.setOutput("source-ref", sourceRef);

      - name: Validate GitHub environments and protection rules
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          APPLY_ENVIRONMENT: ${{ steps.release-metadata.outputs.apply-environment }}
          PLAN_ENVIRONMENT: ${{ steps.release-metadata.outputs.plan-environment }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const environments = await github.paginate(
              github.rest.repos.getAllEnvironments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
              (response) => response.data
            );
            const environmentsByName = new Map(
              environments.map((environment) => [environment.name, environment])
            );

            if (!environmentsByName.has(process.env.PLAN_ENVIRONMENT)) {
              core.setFailed(
                `Plan environment "${process.env.PLAN_ENVIRONMENT}" does not exist`
              );
              return;
            }

            const applyEnvironment = environmentsByName.get(
              process.env.APPLY_ENVIRONMENT
            );
            if (!applyEnvironment) {
              core.setFailed(
                `Apply environment "${process.env.APPLY_ENVIRONMENT}" does not exist`
              );
              return;
            }

            const hasRequiredReviewers =
              applyEnvironment.protection_rules?.some(
                ({ type }) => type === "required_reviewers"
              ) ?? false;
            if (!hasRequiredReviewers) {
              core.setFailed(
                `Apply environment "${process.env.APPLY_ENVIRONMENT}" has no required reviewers`
              );
            }

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ["self-hosted", "${{ needs.validate.outputs.runner-label }}"]
    environment: ${{ needs.validate.outputs.plan-environment }}
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_STORAGE_USE_AZUREAD: true
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Check out released configuration
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0
          ref: ${{ needs.validate.outputs.source-ref }}

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Setup Node.js
        id: node-setup
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies (pnpm)
        if: steps.node-setup.outputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (yarn)
        if: steps.node-setup.outputs.package-manager == 'yarn'
        run: yarn install --immutable

      - name: Install dependencies (npm)
        if: steps.node-setup.outputs.package-manager == 'npm'
        run: npm ci

      - name: Run Terraform plan-upload
        env:
          NX_PROJECT: ${{ inputs.project }}
        run: npx nx run "$NX_PROJECT:tf-plan-upload" -c ci

  apply:
    name: Terraform Apply
    needs: plan
    runs-on: ["self-hosted", "${{ needs.validate.outputs.runner-label }}"]
    environment: ${{ needs.validate.outputs.apply-environment }}
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_STORAGE_USE_AZUREAD: true
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Check out released configuration
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0
          ref: ${{ needs.validate.outputs.source-ref }}

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Setup Node.js
        id: node-setup
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies (pnpm)
        if: steps.node-setup.outputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (yarn)
        if: steps.node-setup.outputs.package-manager == 'yarn'
        run: yarn install --immutable

      - name: Install dependencies (npm)
        if: steps.node-setup.outputs.package-manager == 'npm'
        run: npm ci

      - name: Apply reviewed Terraform plan
        env:
          NX_PROJECT: ${{ inputs.project }}
        run: npx nx release publish --projects="$NX_PROJECT"
