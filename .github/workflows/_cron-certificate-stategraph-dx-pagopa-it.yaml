name: stategraph.dx.pagopa.it TLS Certificate

on:
  schedule:
    - cron: "0 2 * * 1,3"
  workflow_dispatch:
    inputs:
      force_renewal:
        description: "Force the certificate renewal to use when cron-triggered execution fails"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write

jobs:
  dev:
    name: "stategraph.dev.dx.pagopa.it"
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: ${{ inputs.force_renewal || false }}
      key_vault_name: "dx-d-itn-common-kv-01"
      csr_common_name: "stategraph.dev.dx.pagopa.it"
      dns_zone: "dev.dx.pagopa.it"
      dns_zone_resource_group: "dx-d-itn-network-rg-01"
      environment: "automation-dev"

  uat:
    name: "stategraph.uat.dx.pagopa.it"
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: ${{ inputs.force_renewal || false }}
      key_vault_name: "dx-u-itn-common-kv-01"
      csr_common_name: "stategraph.uat.dx.pagopa.it"
      dns_zone: "uat.dx.pagopa.it"
      dns_zone_resource_group: "dx-u-itn-network-rg-01"
      environment: "automation-uat"

  prod:
    name: stategraph.dx.pagopa.it
    uses: pagopa/dx/.github/workflows/release-certificate-v1.yaml@main
    secrets: inherit
    with:
      force_renewal: ${{ inputs.force_renewal || false }}
      key_vault_name: "dx-p-itn-common-kv-01"
      csr_common_name: "stategraph.dx.pagopa.it"
      dns_zone: "dx.pagopa.it"
      dns_zone_resource_group: "dx-p-itn-network-rg-01"
