name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".nx/version-plans/**"
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v2.yaml
    with:
      environment: npm-prod-cd
    secrets:
      github-token: ${{ secrets.BOT_GH_TOKEN }}
