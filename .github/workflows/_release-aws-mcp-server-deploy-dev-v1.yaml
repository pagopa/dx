name: Deploy MCP Server to Dev

# Promotes a released MCP Server image to ECR and deploys it to AWS Lambda.

on:
  push:
    tags:
      - "@pagopa/dx-mcpserver@**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Released MCP Server image version to deploy
        required: true
        type: string

jobs:
  promote-and-deploy:
    name: Promote and Deploy MCP on AWS Lambda
    runs-on: ubuntu-latest
    environment: app-dev-cd
    env:
      AWS_REGION: eu-central-1
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      LAMBDA_FUNCTION_NAME: dx-d-euc1-mcp-server-lambda-01
      IMAGE_NAME: dx/mcp-server
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Resolve Released Image
        id: image
        env:
          RELEASE_TAG: ${{ inputs.image_tag || github.ref_name }}
        run: |
          set -euo pipefail

          image_tag="${RELEASE_TAG##*@}"
          if [[ -z "$image_tag" ]]; then
            echo "::error::A release image tag is required."
            exit 1
          fi

          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Log In to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Promote Released Image to ECR
        id: promote
        env:
          RELEASE_VERSION: ${{ steps.image.outputs.image_tag }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail

          source_image="ghcr.io/$IMAGE_NAME:$RELEASE_VERSION"
          target_image="$ECR_REGISTRY/$IMAGE_NAME:$RELEASE_VERSION"

          docker pull --platform linux/arm64 "$source_image"
          docker tag "$source_image" "$target_image"
          docker push "$target_image"

          echo "image_uri=$target_image" >> $GITHUB_OUTPUT

      - name: Deploy Lambda
        uses: aws-actions/aws-lambda-deploy@d496277188b89f0be02d7a2216fc912c0427702a # v1.1.2
        with:
          function-name: ${{ env.LAMBDA_FUNCTION_NAME }}
          package-type: Image
          image-uri: ${{ steps.promote.outputs.image_uri }}
