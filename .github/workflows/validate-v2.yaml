name: Validate

on:
  workflow_call:

env:
  REFRESH_STATE_EVERY_SECONDS: 600 # 10 minutes

jobs:
  gate:
    name: Fork PR Gate
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.evaluate.outputs.run }}
    steps:
      - name: Evaluate fork PR
        id: evaluate
        env:
          CURRENT_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_HEAD_REPO" ] && [ "$PR_HEAD_REPO" != "$CURRENT_REPO" ]; then
            echo "Blocking forked PR from $PR_HEAD_REPO"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  warn-missing-version-plans:
    name: Warn Missing Version Plans
    needs: gate
    if: ${{ github.event_name == 'pull_request' && needs.gate.outputs.run == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # 3.1.1
        with:
          client-id: ${{ secrets.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-pull-requests: write

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: pnpm --filter . ci

      - name: Warn missing version plan coverage
        uses: pagopa/dx/actions/nx-release@main
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}
          github-token: ${{ steps.generate-token.outputs.token }}

  static-review:
    name: Static Review
    runs-on: ubuntu-24.04
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.work"

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies
        run: pnpm ci

      - name: Cache Nx
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-cache-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-cache-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-
            ${{ runner.os }}-nx-cache-${{ github.workflow }}-

      - name: Sets the base and head SHAs required for `nx affected` command
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Run code quality checks on affected projects
        run: pnpm validate

  get-environments:
    name: Get GitHub Environments for Infrastructure
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    runs-on: ubuntu-24.04
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    permissions:
      contents: read
    steps:
      # GitHub environments named `infra-<env>-ci` or `bootstrapper-<env>-cd`
      # define which credentials and runner labels are used for Terraform plans.
      - name: Get GitHub Environments
        id: detect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const environments = await github.paginate(
              github.rest.repos.getAllEnvironments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
              (response) => response.data
            );
            const planEnvironmentPattern = /^(?:infra-.+-ci|bootstrapper-.+-cd)$/;
            const matrix = environments
              .filter(({ name }) => planEnvironmentPattern.test(name))
              .filter(({ name }) => !name.includes("uat"))
              .map(({ name }) => {
                const [, envName] = name.split("-");
                return {
                  "github-environment": name,
                  "env-name": envName,
                };
              });
            core.setOutput("environments", JSON.stringify(matrix));

  infra-review:
    name: Infrastructure Review (${{ matrix.target.github-environment }})
    needs: get-environments
    if: ${{ needs.get-environments.outputs.environments != '[]' }}
    runs-on: ["self-hosted", "${{ matrix.target.env-name }}"]
    environment: ${{ matrix.target.github-environment }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.get-environments.outputs.environments) }}
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_STORAGE_USE_AZUREAD: true
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GH_APP_CLIENT_ID: ${{ secrets.GH_APP_CLIENT_ID }}
      GH_APP_KEY: ${{ secrets.GH_APP_KEY }}
      GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@feats/tfplan-in-validate

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies
        run: pnpm --filter . ci

      - name: Sets the base and head SHAs required for `nx affected` command
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Generate Cache Key
        if: github.event_name == 'pull_request'
        id: cache-key
        env:
          GITHUB_ENVIRONMENT: ${{ matrix.target.github-environment }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Get current epoch time rounded to chosen window
          ENVIRONMENT_SLUG=$(echo "$GITHUB_ENVIRONMENT" | tr '/' '-')
          TIME_WINDOW=$(( $(date +%s) / $REFRESH_STATE_EVERY_SECONDS ))
          echo "cache-key=tfplan-pr${PR_NUMBER}-${ENVIRONMENT_SLUG}-${TIME_WINDOW}s" >> "$GITHUB_OUTPUT"

      # Restore PR TFPlan Cache (miss = first run or >10 minutes, hit = within 10 minutes)
      - name: Check for Cache
        if: github.event_name == 'pull_request'
        id: tfplan-pr-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tfplan-pr-cache/${{ matrix.target.github-environment }}/.pr_plan_marker
          key: ${{ steps.cache-key.outputs.cache-key }}

      - name: Set Terraform Refresh Flag
        id: set-refresh-flag
        env:
          CACHE_HIT: ${{ steps.tfplan-pr-cache.outputs.cache-hit }}
          MARKER_FILE: .tfplan-pr-cache/${{ matrix.target.github-environment }}/.pr_plan_marker
        run: |
          if [ "$CACHE_HIT" == "true" ]; then
            echo "refresh=false" >> "$GITHUB_OUTPUT"
            echo "::notice::State will NOT be refreshed"
          else
            echo "refresh=true" >> "$GITHUB_OUTPUT"
            echo "::notice::State will be refreshed"

            mkdir -p "$(dirname "$MARKER_FILE")"
            echo "$(date)" > "$MARKER_FILE"
          fi

      - name: Run Terraform plan on affected environment projects
        env:
          ENV_NAME: ${{ matrix.target.env-name }}
          GITHUB_ENVIRONMENT: ${{ matrix.target.github-environment }}
          REFRESH: ${{ steps.set-refresh-flag.outputs.refresh }}
        run: |
          if [[ "$GITHUB_ENVIRONMENT" == bootstrapper-* ]]; then
            pnpm nx affected -t tf-plan -c ci --refresh="$REFRESH" --exclude="*,!bootstrapper-${ENV_NAME}"
          else
            pnpm nx affected -t tf-plan -c ci --refresh="$REFRESH" --exclude="!tag:env:${ENV_NAME},bootstrapper-*"
          fi

      - name: Upload Terraform plan report
        if: ${{ always() && hashFiles('.dx-tasks/**/*.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-tf-plan-${{ matrix.target.github-environment }}
          path: .dx-tasks
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

  report:
    name: Report
    needs: infra-review
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Download Terraform plan reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: report-*
          path: .dx-tasks
          merge-multiple: true

      - name: Post Code Review Report
        uses: pagopa/dx/actions/run-dx-task@feats/tfplan-in-validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          task: reportPrComment
          payload: >-
            {
              "footer": "_Triggered by @${{ github.triggering_actor }}, commit: `${{ github.event.pull_request.head.sha }}`._",
              "issueNumber": ${{ github.event.pull_request.number }},
              "owner": "${{ github.event.repository.owner.login }}",
              "repo": "${{ github.event.repository.name }}",
              "searchPattern": "Code Review Report",
              "title": "Code Review Report"
            }
