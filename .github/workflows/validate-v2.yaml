name: Validate

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  gate:
    name: Fork PR Gate
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.evaluate.outputs.run }}
    steps:
      - name: Evaluate fork PR
        id: evaluate
        env:
          CURRENT_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_HEAD_REPO" ] && [ "$PR_HEAD_REPO" != "$CURRENT_REPO" ]; then
            echo "Blocking forked PR from $PR_HEAD_REPO"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  # validate:
  #   name: Code Review
  #   runs-on: ubuntu-latest
  #   permissions:
  #     actions: read
  #     contents: read
  #     pull-requests: read
  #   steps:
  #     - name: Check out repository
  #       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #       with:
  #         fetch-depth: 0
  #         filter: tree:0

  #     - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
  #       with:
  #         install_args: node

  #     - name: Install dependencies
  #       run: pnpm ci

  #     - name: Sets the base and head SHAs required for `nx affected` command
  #       if: ${{ !env.ACT }}
  #       uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

  #     - name: Run code quality checks on affected projects
  #       run: pnpm nx affected -t lint -c ci

  detect-environments:
    name: Detect Terraform Plan Environments
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    permissions:
      contents: read
    steps:
      - name: Detect Infra CI GitHub Environments
        id: detect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // GitHub environments named `infra-<env>-ci` define which runners can
            // execute Terraform plans; derive the matrix from that source of truth.
            const environments = await github.paginate(
              github.rest.repos.getAllEnvironments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
              (response) => response.data.environments
            );
            // The downstream job expects raw environment names, for example `prod`
            // from `infra-prod-ci`, with duplicates removed in GitHub API order.
            const matrix = Array.from(
              new Set(
                environments
                  .map(({ name }) => /^infra-(.+)-ci$/.exec(name)?.[1])
                  .filter(Boolean)
              )
            );
            core.setOutput("environments", JSON.stringify(matrix));

  terraform-plan:
    name: Terraform Plan (${{ matrix.env }})
    needs: detect-environments
    if: ${{ needs.detect-environments.outputs.matrix != '[]' }}
    runs-on: ["self-hosted", "linux", "amd64", "${{ matrix.env }}"]
    environment: infra-${{ matrix.env }}-ci
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.detect-environments.outputs.environments) }}
    permissions:
      actions: read
      contents: read
      pull-requests: write
    env:
      ARM_STORAGE_USE_AZUREAD: true
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      ARM_USE_AZUREAD: true
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TF_IN_AUTOMATION: true
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies
        run: pnpm --filter . install

      - name: Sets the base and head SHAs required for `nx affected` command
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Run Terraform plan on affected environment projects
        run: pnpm nx affected -t tf-plan -c ci --exclude="*,!tag:env:${{ matrix.env }}"

      - name: Upload Terraform plan report
        if: ${{ always() && hashFiles('.dx-tasks/**/*.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-tf-plan-${{ matrix.env }}
          path: .dx-tasks
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

  report:
    name: Report
    needs:
      - gate
      - detect-environments
      - terraform-plan
    if: ${{ always() && github.event_name == 'pull_request' && needs.gate.outputs.run == 'true' && needs.detect-environments.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Download Terraform plan reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: report-*
          path: .dx-tasks
          merge-multiple: true

      - name: Post Code Review Report
        uses: pagopa/dx/actions/run-dx-tasks@feats/tfplan-in-validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          task: reportPrComment
          payload: >-
            {
              "footer": "_Triggered by @${{ github.triggering_actor }}, commit: `${{ github.event.pull_request.head.sha }}`._",
              "issueNumber": ${{ github.event.pull_request.number }},
              "owner": "${{ github.event.repository.owner.login }}",
              "repo": "${{ github.event.repository.name }}",
              "searchPattern": "Code Review Report",
              "title": "Code Review Report"
            }
