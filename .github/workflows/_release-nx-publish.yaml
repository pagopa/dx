name: Nx Release - Publish

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'nx-release/')
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/release-v1.yaml
    with:
      environment: npm-prod-cd
      mode: publish
    secrets:
      github-token: ${{ secrets.BOT_GH_TOKEN }}
