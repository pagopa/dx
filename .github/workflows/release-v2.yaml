name: Release

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to (e.g., app-prod-cd)"
        required: true
        type: string
        default: "app-prod-cd"
    secrets:
      github-token:
        description: "GitHub token for creating PRs and pushing commits. Should have contents:write and pull-requests:write permissions"
        required: false

jobs:
  summarize-version-plans:
    name: Summarize Version Plans
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Skip forked pull requests
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        shell: bash
        run: echo "Skipping version plan summary for forked pull requests."

      - name: Checkout repository
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Nx Version Plan Summary
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: pagopa/dx/actions/nx-release@feat-add-summary-comment-pr-nx-release-action #main
        with:
          github-token: ${{ secrets.github-token || github.token }}

  release:
    name: Release
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: "true"
          fetch-depth: 0

      - name: Detect Release tool
        id: nx-detect
        shell: bash
        run: |
          if [ -f "nx.json" ]; then
            echo "Detected Nx for managing releases."
          else
            echo "::error:: No supported release tool detected. Please ensure Nx is configured."
            exit 1
          fi

      - name: Setup Node.js
        id: node-setup
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Update npm (for provenance support)
        shell: bash
        run: npm install -g npm@11.8.0

      - name: Install dependencies (pnpm)
        if: steps.node-setup.outputs.package-manager == 'pnpm'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (yarn)
        if: steps.node-setup.outputs.package-manager == 'yarn'
        shell: bash
        run: yarn install --immutable

      - name: Install dependencies (npm)
        if: steps.node-setup.outputs.package-manager == 'npm'
        shell: bash
        run: npm ci

      - name: Nx Publish
        uses: pagopa/dx/actions/nx-release@feat-add-summary-comment-pr-nx-release-action #main
        with:
          github-token: ${{ secrets.github-token || github.token }}
