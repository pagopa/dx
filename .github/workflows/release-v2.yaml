name: Release

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to (e.g., app-prod-cd)"
        required: true
        type: string
        default: "app-prod-cd"
    secrets:
      app-client-id:
        description: "GitHub App Client ID for authentication"
        required: true
      app-private-key:
        description: "GitHub App private key for authentication"
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # 3.1.1
        with:
          client-id: ${{ secrets.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: "true"
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Detect Release tool
        id: nx-detect
        shell: bash
        run: |
          if [ -f "nx.json" ]; then
            echo "Detected Nx for managing releases."
          else
            echo "::error:: No supported release tool detected. Please ensure Nx is configured."
            exit 1
          fi

      - name: Setup Node.js
        id: node-setup
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Update npm (for provenance support)
        shell: bash
        run: npm install -g npm@11.8.0

      - name: Install dependencies (pnpm)
        if: steps.node-setup.outputs.package-manager == 'pnpm'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (yarn)
        if: steps.node-setup.outputs.package-manager == 'yarn'
        shell: bash
        run: yarn install --immutable

      - name: Install dependencies (npm)
        if: steps.node-setup.outputs.package-manager == 'npm'
        shell: bash
        run: npm ci

      - name: Nx Publish
        id: nx-release
        uses: pagopa/dx/actions/nx-release@main
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}
          github-token: ${{ steps.generate-token.outputs.token }}
    outputs:
      published-pr-number: ${{ steps.nx-release.outputs.published-pr-number }}
      release-mode: ${{ steps.nx-release.outputs.release-mode }}

  # The jobs below apply Terraform changes for deployable environments
  # (infra/resources/*) that were included in the merged "Version Packages"
  # PR, using the same version-plan-driven flow as npm/module releases. They
  # are additive to the "release" job above and do not change its behavior.
  get-infra-projects:
    name: Get Infra Projects To Apply
    needs: release
    # Only run when the "release" job actually published the projects from a
    # merged "Version Packages" PR in THIS run. Excludes "create-pr" (a
    # version plan was just added, nothing was published yet), "skip", and
    # "publish-all" (workflow_dispatch recovery mode across all public
    # projects: too ambiguous to safely infer which infra changes to apply).
    # Also requires "release" to have actually succeeded, so a failed run
    # never triggers infra apply from a stale, previously-published PR.
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release-mode == 'publish' && needs.release.outputs.published-pr-number != '' }}
    runs-on: ubuntu-24.04
    outputs:
      projects: ${{ steps.extract.outputs.projects }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: pnpm --filter . ci

      - name: Extract infra projects to apply
        id: extract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.release.outputs.published-pr-number }}
        run: |
          set -euo pipefail
          PROJECTS=$(node actions/nx-release/scripts/dist/extract-infra-projects-to-apply.js)
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"

  get-environments-infra:
    name: Get GitHub Environments for Infra Apply
    needs: get-infra-projects
    if: ${{ needs.get-infra-projects.outputs.projects != '' }}
    runs-on: ubuntu-24.04
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    permissions:
      contents: read
    steps:
      # GitHub environments named `infra-<env>-cd` hold the write credentials
      # (and the `required_reviewers` approval gate) used to apply Terraform
      # changes for a given environment.
      - name: Get GitHub Environments
        id: detect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const environments = await github.paginate(
              github.rest.repos.getAllEnvironments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
              (response) => response.data
            );
            const applyEnvironmentPattern = /^infra-.+-cd$/;
            const matrix = environments
              .filter(({ name }) => applyEnvironmentPattern.test(name))
              .filter(({ name }) => !name.includes("uat"))
              .map(({ name }) => {
                const [, envName] = name.split("-");
                return {
                  "github-environment": name,
                  "env-name": envName,
                };
              });
            core.setOutput("environments", JSON.stringify(matrix));

  infra-plan:
    name: Infra Plan (${{ matrix.target.github-environment }})
    needs: [get-infra-projects, get-environments-infra]
    if: ${{ needs.get-environments-infra.outputs.environments != '[]' }}
    runs-on: ["self-hosted", "${{ matrix.target.env-name }}"]
    # Every "infra-<env>-cd" environment has a paired "infra-<env>-ci"
    # environment with read-only credentials, used here since planning does
    # not require write access and must not trigger the apply approval gate.
    environment: infra-${{ matrix.target.env-name }}-ci
    # Shared with infra-apply below, keyed per environment (not per directory,
    # unlike the legacy infra_apply.yaml matrix): overlapping workflow runs
    # for the SAME environment queue sequentially instead of running a
    # concurrent plan/apply against the same Terraform state and plan bundle
    # storage path. Different environments still run in parallel.
    concurrency:
      group: infra-terraform-${{ matrix.target.github-environment }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.get-environments-infra.outputs.environments) }}
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_STORAGE_USE_AZUREAD: true
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies
        run: pnpm --filter . ci

      # Assumes the infra/resources/<env> Nx project is named "resources-<env>"
      # (see getProjectNameFromRoot in nx-terraform-plugin), matching this
      # environment. Skips silently if that project was not part of this
      # release.
      - name: Run Terraform plan-upload for this environment
        env:
          ENV_NAME: ${{ matrix.target.env-name }}
          PROJECTS: ${{ needs.get-infra-projects.outputs.projects }}
        run: |
          set -euo pipefail
          PROJECT="resources-${ENV_NAME}"
          if echo ",${PROJECTS}," | grep -q ",${PROJECT},"; then
            pnpm nx run "${PROJECT}:tf-plan-upload" -c ci
          else
            echo "::notice::${PROJECT} is not part of this release, skipping plan"
          fi

  infra-apply:
    name: Infra Apply (${{ matrix.target.github-environment }})
    needs: [get-infra-projects, get-environments-infra, infra-plan]
    if: ${{ needs.get-environments-infra.outputs.environments != '[]' }}
    runs-on: ["self-hosted", "${{ matrix.target.env-name }}"]
    # This environment has the `required_reviewers` protection rule
    # configured on GitHub: the job pauses here until a human approves,
    # after reviewing the plan produced by the infra-plan job above.
    environment: ${{ matrix.target.github-environment }}
    # Same group as infra-plan above, so a pending approval on this
    # environment (which can take an arbitrary amount of time) also blocks a
    # later workflow run's plan/apply for the same environment from starting
    # concurrently, rather than racing against the same Terraform state.
    concurrency:
      group: infra-terraform-${{ matrix.target.github-environment }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.get-environments-infra.outputs.environments) }}
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_STORAGE_USE_AZUREAD: true
      ROLE_ARN: ${{ secrets.ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Cloud Login
        uses: pagopa/dx/actions/csp-login@main

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Setup Terraform
        uses: pagopa/dx/.github/actions/terraform-setup@main

      - name: Install dependencies
        run: pnpm --filter . ci

      - name: Run Terraform release-publish (apply) for this environment
        env:
          ENV_NAME: ${{ matrix.target.env-name }}
          PROJECTS: ${{ needs.get-infra-projects.outputs.projects }}
        run: |
          set -euo pipefail
          PROJECT="resources-${ENV_NAME}"
          if echo ",${PROJECTS}," | grep -q ",${PROJECT},"; then
            npx nx release publish --projects="${PROJECT}"
          else
            echo "::notice::${PROJECT} is not part of this release, skipping apply"
          fi
