name: Release

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to (e.g., app-prod-cd)"
        required: true
        type: string
        default: "app-prod-cd"
      terraform-deployment-workflow:
        description: "Workflow file in the caller repository that deploys one released Terraform environment"
        required: false
        type: string
        default: "release-terraform-environment-v1.yaml"
    secrets:
      app-client-id:
        description: "GitHub App Client ID for authentication"
        required: true
      app-private-key:
        description: "GitHub App private key for authentication"
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # 3.1.1
        with:
          client-id: ${{ secrets.app-client-id }}
          private-key: ${{ secrets.app-private-key }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: "true"
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Detect Release tool
        id: nx-detect
        shell: bash
        run: |
          if [ -f "nx.json" ]; then
            echo "Detected Nx for managing releases."
          else
            echo "::error:: No supported release tool detected. Please ensure Nx is configured."
            exit 1
          fi

      - name: Setup Node.js
        id: node-setup
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Update npm (for provenance support)
        shell: bash
        run: npm install -g npm@11.8.0

      - name: Install dependencies (pnpm)
        if: steps.node-setup.outputs.package-manager == 'pnpm'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (yarn)
        if: steps.node-setup.outputs.package-manager == 'yarn'
        shell: bash
        run: yarn install --immutable

      - name: Install dependencies (npm)
        if: steps.node-setup.outputs.package-manager == 'npm'
        shell: bash
        run: npm ci

      - name: Nx Publish
        id: nx-release
        uses: pagopa/dx/actions/nx-release@main
        with:
          app-slug: ${{ steps.generate-token.outputs.app-slug }}
          github-token: ${{ steps.generate-token.outputs.token }}
    outputs:
      published-pr-number: ${{ steps.nx-release.outputs.published-pr-number }}
      released-environment-matrix: ${{ steps.nx-release.outputs.released-environment-matrix }}
      release-mode: ${{ steps.nx-release.outputs.release-mode }}

  dispatch-infra-releases:
    name: Dispatch Infra Release (${{ matrix.target.project }})
    needs: release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.release-mode == 'publish' && needs.release.outputs.released-environment-matrix != '[]' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.release.outputs.released-environment-matrix) }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Terraform environment release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEPLOYMENT_WORKFLOW: ${{ inputs.terraform-deployment-workflow }}
          NX_PROJECT: ${{ matrix.target.project }}
          PROJECT_ROOT: ${{ matrix.target.projectRoot }}
          SOURCE_REF: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.event.repository.default_branch }}
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: process.env.DEPLOYMENT_WORKFLOW,
              ref: process.env.WORKFLOW_REF,
              inputs: {
                project: process.env.NX_PROJECT,
                "project-root": process.env.PROJECT_ROOT,
                "source-ref": process.env.SOURCE_REF,
              },
            });
