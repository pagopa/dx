name: "Node Setup"
description: "Setup Node.js and Turbo cache"

# To start the turbo cache, set the TURBO_CACHE_DIR environment variable to the directory where you want to store the cache.
# For example, you can set it to .turbo-cache in your project directory.

inputs:
  working_dir:
    description: "Specify the working directory"
    required: false
    default: "."

outputs:
  package-manager:
    description: "The detected package manager (npm, yarn, pnpm)"
    value: ${{ steps.detect-pm.outputs.package-manager }}

runs:
  using: "composite"

  steps:
    - name: Enable Corepack
      shell: bash
      run: |
        # On self-hosted runners the job runs as a non-root user
        # and lacks write access to /usr/bin, causing `corepack enable` to fail
        # with EACCES. Install shims into a user-writable directory instead and
        # expose it on PATH via GITHUB_PATH.
        if ! corepack enable 2>/dev/null; then
          echo "Command failed, falling back to user-local shims"
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        fi

    - name: Detect Node.js package manager
      id: detect-pm
      uses: pagopa/dx/actions/detect-node-package-manager@main

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: .node-version
        cache: ${{ steps.detect-pm.outputs.package-manager }}

    - name: Setup turbo cache
      if: ${{ env.TURBO_CACHE_DIR != '' }}
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ inputs.working_dir }}/${{ env.TURBO_CACHE_DIR }}
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Export Package Manager
      shell: bash
      env:
        package_manager: ${{ steps.detect-pm.outputs.package-manager }}
      run: |
        echo "NODE_PACKAGE_MANAGER=$package_manager" >> "$GITHUB_ENV"
