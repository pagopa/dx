packages:
  - packages/*
  - apps/*
  - infra/modules/*
  - infra/scripts
  - providers/*
  - actions/*

catalog:
  '@azure/identity': ^4.13.0
  '@logtape/logtape': ^1.3.7
  '@modelcontextprotocol/sdk': ^1.26.0
  '@tsconfig/node24': 24.0.0
  '@types/node': ^22.19.15
  '@types/semver': ^7.7.1
  '@vitest/coverage-v8': ^3.2.4
  eslint: ^9.39.2
  commander: ^14.0.3
  execa: ^9.6.1
  neverthrow: ^8.2.0
  '@opentelemetry/api': ^1.9.0
  plop: ^4.0.5
  prettier: 3.6.2
  semver: ^7.7.4
  tsx: ^4.21.0
  tsup: ^8.5.1
  typescript: ~5.8.3
  vitest: ^3.2.4
  vitest-mock-extended: ^3.1.0
  zod: ^4.3.6

cleanupUnusedCatalogs: true

linkWorkspacePackages: true

