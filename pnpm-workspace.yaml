packages:
  - packages/*
  - apps/*
  - infra/modules/*
  - infra/scripts
  - providers/*
  - actions/*

overrides:
  "copy-webpack-plugin>serialize-javascript": 7.0.5
  "css-minimizer-webpack-plugin>serialize-javascript": 7.0.5
  "lodash-es": 4.18.1

allowBuilds:
  '@swc/core': true
  core-js: false
  cpu-features: true
  esbuild: false
  nx: true
  protobufjs: false
  sharp: false
  ssh2: true
  unrs-resolver: false

catalog:
  '@azure/identity': ^4.13.1
  '@logtape/logtape': ^1.3.8
  '@modelcontextprotocol/sdk': ^1.29.0
  '@tsconfig/node24': 24.0.4
  '@types/js-yaml': ^4.0.9
  '@types/node': ^22.19.17
  '@types/semver': ^7.7.1
  '@vitest/coverage-v8': ^4.1.8
  commander: ^14.0.3
  eslint: ^10.3.0
  execa: ^9.6.1
  js-yaml: ^4.1.1
  neverthrow: ^8.2.0
  octokit: ^5.0.5
  plop: ^4.0.5
  prettier: 3.8.3
  semver: ^7.7.4
  tsup: ^8.5.1
  tsx: ^4.21.0
  typescript: ~5.9.3
  vitest: ^4.1.8
  vitest-mock-extended: ^4.0.0
  zod: ^4.4.2

catalogs:

  aws:
    '@aws-sdk/client-s3': ^3.1057.0

  azure:
    '@azure/storage-blob': ^12.31.0

  github-actions:
    '@actions/core': ^3.0.1
    '@actions/github': ^9.1.1
  opentelemetry:
    '@azure/monitor-opentelemetry': 1.18.1
    '@azure/monitor-opentelemetry-exporter': ^1.0.0-beta.42
    '@opentelemetry/api': ^1.9.1
    '@opentelemetry/api-logs': ^0.218.0
    '@opentelemetry/instrumentation': ^0.218.0
    '@opentelemetry/instrumentation-undici': ^0.28.0
    '@opentelemetry/resources': ^2.7.1
    '@opentelemetry/sdk-metrics': ^2.7.1
    '@opentelemetry/sdk-trace-base': ^2.7.1

  react:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.5
    react-dom: ^19.2.5

cleanupUnusedCatalogs: true

linkWorkspacePackages: true

minimumReleaseAge: 4320

onlyBuiltDependencies:
  - '@swc/core'
  - core-js
  - core-js-pure
  - esbuild
  - nx
  - prisma
  - protobufjs

packageImportMethod: clone-or-copy
