packages:
  - packages/*
  - apps/*
  - infra/modules/*
  - infra/scripts
  - providers/*
  - actions/*

overrides:
  "copy-webpack-plugin>serialize-javascript": 7.0.5
  "css-minimizer-webpack-plugin>serialize-javascript": 7.0.5
  "lodash-es": 4.18.1
  "@logtape/otel>@opentelemetry/api-logs": ^0.218.0
  "@logtape/otel>@opentelemetry/sdk-logs": ^0.218.0
  "@logtape/otel>@opentelemetry/otlp-exporter-base": ^0.218.0
  "@logtape/otel>@opentelemetry/exporter-logs-otlp-grpc": ^0.218.0
  "@logtape/otel>@opentelemetry/exporter-logs-otlp-http": ^0.218.0
  "@logtape/otel>@opentelemetry/exporter-logs-otlp-proto": ^0.218.0

allowBuilds:
  "@swc/core": true
  core-js: false
  cpu-features: true
  esbuild: false
  nx: true
  protobufjs: false
  sharp: false
  ssh2: true
  unrs-resolver: false

catalog:
  "@azure/identity": ^4.13.1
  "@logtape/logtape": ^1.3.11
  "@modelcontextprotocol/sdk": ^1.29.0
  "@tsconfig/node24": 24.0.4
  "@types/js-yaml": ^4.0.9
  "@types/node": ^22.20.1
  "@types/semver": ^7.7.1
  "@vitest/coverage-v8": ^4.1.10
  commander: ^14.0.3
  eslint: ^10.7.0
  execa: ^9.6.1
  js-yaml: ^4.3.0
  neverthrow: ^8.2.0
  octokit: ^5.0.5
  plop: ^4.0.5
  prettier: 3.9.5
  semver: ^7.8.5
  tsdown: ^0.22.12
  tsup: ^8.5.1
  tsx: ^4.23.1
  typescript: ~5.9.3
  vitest: ^4.1.10
  vitest-mock-extended: ^4.0.0
  zod: ^4.4.3

catalogs:
  aws:
    "@aws-sdk/client-s3": ^3.1090.0

  azure:
    "@azure/storage-blob": ^12.33.0

  github-actions:
    "@actions/core": ^3.0.1
    "@actions/github": ^9.1.1
  opentelemetry:
    "@azure/monitor-opentelemetry": 1.18.2
    "@azure/monitor-opentelemetry-exporter": 1.0.0-beta.42
    "@logtape/otel": 1.3.8
    "@opentelemetry/api": ^1.9.1
    "@opentelemetry/api-logs": ^0.220.0
    "@opentelemetry/instrumentation": ^0.220.0
    "@opentelemetry/instrumentation-undici": ^0.30.0
    "@opentelemetry/resources": ^2.9.0
    "@opentelemetry/sdk-trace-base": ^2.9.0
    "@opentelemetry/sdk-logs": ^0.220.0

  react:
    "@types/react": ^19.2.17
    "@types/react-dom": ^19.2.3
    react: ^19.2.7
    react-dom: ^19.2.7

cleanupUnusedCatalogs: true

linkWorkspacePackages: true

minimumReleaseAge: 4320

onlyBuiltDependencies:
  - "@swc/core"
  - core-js
  - core-js-pure
  - esbuild
  - nx
  - prisma
  - protobufjs

packageImportMethod: clone-or-copy

trustLockfile: true
