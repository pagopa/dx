name: Get Terraform Backend Config
description: >
  Reads the Terraform backend configuration from the initialised .terraform/
  directory and derives the plan bundle path used by the upload and download
  actions.

  Outputs the cloud provider, storage credentials, and the remote plan path
  (plan-artifacts/<state-basename>.<GITHUB_RUN_ID> next to the state file).

  Supported backends: azurerm, s3.

inputs:
  working-directory:
    description: >
      Directory containing the initialised .terraform/ directory
      (i.e. terraform init must have already run).
    required: true

outputs:
  provider:
    description: Detected cloud provider. Either "azure" or "aws".
    value: ${{ steps.read.outputs.provider }}
  plan-path:
    description: Remote path for the plan bundle in the state storage.
    value: ${{ steps.read.outputs.plan-path }}
  azure-storage-account:
    description: Azure Storage Account name. Set when provider is "azure".
    value: ${{ steps.read.outputs.azure-storage-account }}
  azure-container:
    description: Azure Blob container name. Set when provider is "azure".
    value: ${{ steps.read.outputs.azure-container }}
  aws-bucket:
    description: S3 bucket name. Set when provider is "aws".
    value: ${{ steps.read.outputs.aws-bucket }}
  aws-region:
    description: AWS region. Set when provider is "aws".
    value: ${{ steps.read.outputs.aws-region }}

runs:
  using: composite
  steps:
    - name: Read backend config
      id: read
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        TYPE=$(jq -r '.backend.type' .terraform/terraform.tfstate)
        STATE_KEY=$(jq -r '.backend.config.key' .terraform/terraform.tfstate)
        STATE_DIR=$(dirname "$STATE_KEY")
        STATE_BASENAME=$(basename "$STATE_KEY")
        if [ "$STATE_DIR" = "." ]; then
          PLAN_PATH="plan-artifacts/${STATE_BASENAME}.${GITHUB_RUN_ID}"
        else
          PLAN_PATH="${STATE_DIR}/plan-artifacts/${STATE_BASENAME}.${GITHUB_RUN_ID}"
        fi
        echo "plan-path=${PLAN_PATH}" >> "$GITHUB_OUTPUT"
        case "$TYPE" in
          azurerm)
            echo "provider=azure" >> "$GITHUB_OUTPUT"
            echo "azure-storage-account=$(jq -r '.backend.config.storage_account_name' .terraform/terraform.tfstate)" >> "$GITHUB_OUTPUT"
            echo "azure-container=$(jq -r '.backend.config.container_name' .terraform/terraform.tfstate)" >> "$GITHUB_OUTPUT"
            ;;
          s3)
            echo "provider=aws" >> "$GITHUB_OUTPUT"
            echo "aws-bucket=$(jq -r '.backend.config.bucket' .terraform/terraform.tfstate)" >> "$GITHUB_OUTPUT"
            echo "aws-region=$(jq -r '.backend.config.region' .terraform/terraform.tfstate)" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "::error::Unsupported backend type '${TYPE}'."
            exit 1
            ;;
        esac
