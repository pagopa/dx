name: Upload Terraform Plan
description: >
  Encrypts a Terraform plan file and uploads it as a GitHub Actions artifact.
  Optionally also uploads the plain plan to the Terraform remote state storage
  (Azure Blob Storage or S3) before encrypting.

inputs:
  plan-file:
    description: Name of the Terraform plan file to encrypt and upload
    required: true
  working-directory:
    description: Working directory containing the plan file
    required: true
  artifact-name:
    description: Name for the uploaded artifact
    required: true
  retention-days:
    description: Number of days to retain the artifact
    required: false
    default: "1"
  backend-destination:
    description: >
      If set, the plain plan is also uploaded to this remote path in the state storage
      (same container / bucket used for the Terraform state file) before encrypting.
      When empty the backend upload is skipped.
    required: false
    default: ""
  provider:
    description: Cloud storage provider for the backend upload. Accepted values are "azure" and "aws".
    required: false
    default: ""
  azure-storage-account:
    description: Azure Storage Account name. Required when provider is "azure".
    required: false
    default: ""
  azure-container:
    description: Azure Blob container name. Required when provider is "azure".
    required: false
    default: ""
  aws-bucket:
    description: S3 bucket name. Required when provider is "aws".
    required: false
    default: ""
  aws-region:
    description: AWS region where the S3 bucket lives. Required when provider is "aws".
    required: false
    default: ""
  workflow-run-url:
    description: >
      If provided, attached to the backend object as a tag (key: workflow-run-url)
      for traceability. Has no effect when backend-destination is empty.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Upload Plan to State Storage
      if: ${{ inputs.backend-destination != '' }}
      uses: pagopa/dx/actions/cloud-storage-upload@main
      with:
        provider: ${{ inputs.provider }}
        file-path: ${{ inputs.working-directory }}/${{ inputs.plan-file }}
        destination: ${{ inputs.backend-destination }}
        azure-storage-account: ${{ inputs.azure-storage-account }}
        azure-container: ${{ inputs.azure-container }}
        aws-bucket: ${{ inputs.aws-bucket }}
        aws-region: ${{ inputs.aws-region }}
        workflow-run-url: ${{ inputs.workflow-run-url }}

    - name: Encrypt Terraform Plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PLAN_FILE: ${{ inputs.plan-file }}
        ENCRYPTION_PASSPHRASE: ${{ env.ARTIFACT_ENC_KEY }}
      run: |
        set -euo pipefail
        openssl enc -aes-256-cbc -salt -pbkdf2 \
          -in "$PLAN_FILE" \
          -out "${PLAN_FILE}.enc" \
          -pass env:ENCRYPTION_PASSPHRASE
        rm -f "$PLAN_FILE"

    - name: Upload Terraform Plan as Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/${{ inputs.plan-file }}.enc
        if-no-files-found: error
        retention-days: ${{ inputs.retention-days }}
