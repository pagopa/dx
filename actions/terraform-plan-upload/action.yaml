name: Upload Terraform Plan
description: >
  Reads the Terraform backend configuration from the initialised .terraform/
  directory, bundles the plan file together with .terraform.lock.hcl and
  .terraform/modules/, and uploads the archive to the same storage backend
  used for the Terraform state.
  The bundle is stored under a plan-artifacts/ sibling path next to the state
  file and is automatically deleted by the companion download action after a
  successful apply.

inputs:
  plan-file:
    description: Name of the Terraform plan file to upload
    required: true
  working-directory:
    description: >
      Working directory containing the plan file and the initialised .terraform/
      directory (produced by running terraform init before this action).
    required: true
  artifact-name:
    description: Unused. Kept for backward compatibility.
    required: false
    default: ""
  retention-days:
    description: Unused. Kept for backward compatibility.
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Read Terraform Backend Config
      id: backend
      uses: pagopa/dx/actions/get-terraform-backend-config@main
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Upload Plan Bundle to State Storage
      uses: pagopa/dx/actions/cloud-storage-upload@main
      with:
        provider: ${{ steps.backend.outputs.provider }}
        file-paths: |
          ${{ inputs.plan-file }}
          .terraform.lock.hcl
          .terraform/modules/
        working-directory: ${{ inputs.working-directory }}
        destination: ${{ steps.backend.outputs.plan-path }}
        azure-storage-account: ${{ steps.backend.outputs.azure-storage-account }}
        azure-container: ${{ steps.backend.outputs.azure-container }}
        aws-bucket: ${{ steps.backend.outputs.aws-bucket }}
        aws-region: ${{ steps.backend.outputs.aws-region }}
