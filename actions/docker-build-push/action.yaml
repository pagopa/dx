name: Docker Build and Push
description: Build and optionally push a Docker image to a container registry (GitHub or Amazon Elastic Container Registry)

inputs:
  dockerfile_path:
    required: false
    default: "./Dockerfile"
    description: "Dockerfile path"
  dockerfile_context:
    required: false
    default: "."
    description: "Dockerfile build context"
  docker_image_name:
    required: false
    default: ${{ github.repository }}
    description: "Docker image name, defaults to repository name"
  docker_image_description:
    required: true
    description: "Image description set as image label."
  docker_image_authors:
    required: true
    description: "Author(s) of the image, required for labeling. Can be the organization and/or team names, comma separated."
  build_args:
    required: false
    description: |
      List of build arguments for the Dockerfile build, in YAML list format (one key=value per line), e.g.:
        ```
        build_args: |
          key1=value1
          key2=value2
        ```
  build_target:
    required: false
    description: "Target build stage in a multi-stage Dockerfile (e.g., 'import-runner'). Omit to build the default final stage."
  build_platforms:
    required: true
    description: |
      Target platform(s) for the image. Common values: linux/amd64, linux/arm64, linux/arm/v7, linux/386.
      Multiple platforms can be specified as comma-separated list (e.g., 'linux/amd64,linux/arm64').
  registry:
    required: false
    default: ghcr
    description: "Container registry to push the image to (values: ghcr, ecr)"
  push_to_registry:
    required: false
    default: "true"
    description: "Push the image to the registry"

outputs:
  image_tags:
    description: "The tags applied to the built image"
    value: ${{ steps.meta.outputs.tags }}
  registry_uri:
    description: "The registry URI used for the image"
    value: ${{ steps.set-registry-url.outputs.registry_url }}
  image_uri:
    description: "The full image URI including tag"
    value: "${{ steps.set-registry-url.outputs.image_uri }}:${{ steps.meta.outputs.version }}"

runs:
  using: composite
  steps:
    - name: Setup Docker buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Set up registry
      id: set-up-registry
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        REGISTRY_LOWER=$(echo "$REGISTRY" | tr '[:upper:]' '[:lower:]')

        if [ "$REGISTRY_LOWER" = "ecr" ]; then
          echo "Logging into Amazon ECR"
        elif [ "$REGISTRY_LOWER" = "ghcr" ]; then
          echo "Using GitHub Container Registry"
        else
          echo "Unsupported registry: $REGISTRY"
          exit 1
        fi
        echo "choice=$REGISTRY_LOWER" >> $GITHUB_OUTPUT

    - name: Log in to the Container registry
      id: login-github
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      if: ${{ inputs.push_to_registry == 'true' && steps.set-up-registry.outputs.choice == 'ghcr' }}
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ env.GITHUB_TOKEN }}

    - name: Log in to Amazon ECR
      id: login-ecr
      if: ${{ inputs.push_to_registry == 'true' && steps.set-up-registry.outputs.choice == 'ecr' }}
      uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2

    - name: Set Registry URL
      id: set-registry-url
      shell: bash
      run: |
        if [ "$REGISTRY_CHOICE" = "ecr" ] && [ "$PUSH_TO_REGISTRY" = "true" ]; then
          REGISTRY_URL="$ECR_REGISTRY"
        else
          REGISTRY_URL="ghcr.io"
        fi
        echo "registry_url=$REGISTRY_URL" >> $GITHUB_OUTPUT
        echo "image_uri=$REGISTRY_URL/$IMAGE_NAME" >> $GITHUB_OUTPUT
      env:
        REGISTRY_CHOICE: ${{ steps.set-up-registry.outputs.choice }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        PUSH_TO_REGISTRY: ${{ inputs.push_to_registry }}
        IMAGE_NAME: ${{ inputs.docker_image_name }}

    - name: Intercept pushed Tag
      id: intercept-tag
      shell: bash
      run: |
        # Extract tag name if workflow was triggered by a tag push
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Extract version from tag
          # Examples: @draft/tag@v1.0.9 -> v1.0.9, @draft/tag@1.0.9 -> 1.0.9, v1.0.9 -> v1.0.9

          if [[ "$TAG_NAME" =~ .*@?(v[0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            # Version with 'v' prefix
            VERSION_TAG="${BASH_REMATCH[1]}"
          elif [[ "$TAG_NAME" =~ .*@?([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            # Version without 'v' prefix
            VERSION_TAG="${BASH_REMATCH[1]}"
          else
            # If no version pattern found, use the full tag
            VERSION_TAG="$TAG_NAME"
          fi

          echo "tag_name=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "✅ Triggered by tag: $TAG_NAME -> using version: $VERSION_TAG"
        else
          echo "ℹ️  Not triggered by a tag"
        fi

    - name: Docker Meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      env:
        IMAGE_NAME: ${{ inputs.docker_image_name }}
        DESCRIPTION: "${{ inputs.docker_image_description }}"
        AUTHORS: ${{ inputs.docker_image_authors }}
        REPOSITORY: ${{ github.repository }}
        REGISTRY_URL: ${{ steps.set-registry-url.outputs.registry_url }}
        TAG_NAME: ${{ steps.intercept-tag.outputs.tag_name }}
      with:
        images: ${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          type=ref,event=branch
          type=sha
          ${{ env.TAG_NAME }}
        labels: |
          org.opencontainers.image.title=${{ env.IMAGE_NAME }}
          org.opencontainers.image.description=${{ env.DESCRIPTION }}
          org.opencontainers.image.authors=${{ env.AUTHORS }}
          org.opencontainers.image.url=github.com/${{ env.REPOSITORY }}
          org.opencontainers.image.source=https://github.com/${{ env.IMAGE_NAME }}

    - name: ${{ inputs.push_to_registry == 'true' && 'Build and Push Image' || 'Build Image' }}
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      id: push_registry
      env:
        DOCKERFILE_CONTEXT: ${{ inputs.dockerfile_context }}
        DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
        BUILD_ARGS: ${{ inputs.build_args }}
        BUILD_PLATFORMS: ${{ inputs.build_platforms }}
        SOURCE_DATE_EPOCH: 0 # https://docs.docker.com/build/ci/github-actions/reproducible-builds/
      with:
        context: ${{ env.DOCKERFILE_CONTEXT }}
        file: ${{ env.DOCKERFILE_PATH }}
        push: ${{ inputs.push_to_registry }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        cache-from: type=gha
        cache-to: type=gha,mode=min
        build-args: ${{ env.BUILD_ARGS }}
        platforms: ${{ env.BUILD_PLATFORMS }}
        target: ${{ inputs.build_target }}
        provenance: false

    # Create an entry in github.com/org/repo/attestations
    # to verify the provenance of the image through
    # e.g. gh attestation verify oci://<img-uri> --owner org
    - name: Generate Artifact Attestation
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      if: ${{ inputs.push_to_registry == 'true' && steps.set-up-registry.outputs.choice == 'ghcr' }}
      with:
        subject-name: ${{ steps.set-registry-url.outputs.image_uri }}
        subject-digest: ${{ steps.push_registry.outputs.digest }}
        push-to-registry: false
