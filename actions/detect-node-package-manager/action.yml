name: "Detect Node.js Package Manager"
description: "This action detects the Node.js package manager used in the repository."

outputs:
  package-manager:
    description: "The detected package manager (npm, yarn, pnpm)"
    value: ${{ steps.detect-pm.outputs.package-manager }}

runs:
  using: composite
  steps:
    - name: Detect package manager
      id: detect-pm
      shell: bash
      run: |
        # First, try to detect from package.json packageManager field
        if [ -f "package.json" ]; then
          PACKAGE_MANAGER=$(jq -r '.packageManager // empty' package.json 2>/dev/null | cut -d'@' -f1)

          if [ -n "$PACKAGE_MANAGER" ]; then
            echo "package-manager=$PACKAGE_MANAGER" >> $GITHUB_OUTPUT
            echo "Detected package manager from package.json: $PACKAGE_MANAGER"
            exit 0
          fi
        fi

        # Fall back to lock file detection
        if [ -f "yarn.lock" ]; then
          echo "package-manager=yarn" >> $GITHUB_OUTPUT
          echo "Detected package manager from lock file: yarn"
        elif [ -f "pnpm-lock.yaml" ]; then
          echo "package-manager=pnpm" >> $GITHUB_OUTPUT
          echo "Detected package manager from lock file: pnpm"
        elif [ -f "package-lock.json" ]; then
          echo "package-manager=npm" >> $GITHUB_OUTPUT
          echo "Detected package manager from lock file: npm"
        else
          echo "package-manager=npm" >> $GITHUB_OUTPUT
          echo "No package manager detected, defaulting to npm"
        fi

        # Only show deprecation notice after Oct 3, 2025 at 10:00
        NOW_TS=$(date -u +%s)
        DEPRECATION_TS=$(date -u -d "2025-09-03T10:00:00Z" +%s)

        echo "now-ts=$NOW_TS" >> $GITHUB_OUTPUT
        echo "deprecation-ts=$DEPRECATION_TS" >> $GITHUB_OUTPUT

    - name: Post Plan on PR
      id: comment
      if: steps.detect-pm.outputs.package-manager == 'pnpm' && steps.now-ts.outputs.now-ts > steps.deprecation-ts.outputs.deprecation-ts && github.event_name == 'pull_request'
      uses: pagopa/dx/actions/pr-comment@main
      with:
        comment-body: |
          ### ⚠️ Deprecation Notice
          Starting **January 16th, 2026**, we will no longer support **yarn** and **npm** in our pipelines. All new builds will be required to use [**pnpm**](https://pnpm.io).

          To ensure a smooth transition, we have created a migration guide on our blog.
          [Read our blog announcement](https://dx.pagopa.it/blog/migrating-to-pnpm/)
        search-pattern: "Deprecation Notice"
