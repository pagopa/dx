name: Download Terraform Plan
description: >
  Reads the Terraform backend configuration from the initialised .terraform/
  directory, downloads the plan bundle, and extracts it into working-directory.
  Uses the same GITHUB_RUN_ID as the upload action to reconstruct the remote
  path — no extra inputs required.
  The remote bundle is automatically deleted after a successful apply.
  Requires terraform init (or terraform init -backend-only) to have already
  run in working-directory before this action is called.

inputs:
  plan-file:
    description: Unused. Kept for backward compatibility.
    required: false
    default: ""
  working-directory:
    description: >
      Directory containing the Terraform configuration.
      The plan bundle (plan file, .terraform.lock.hcl, .terraform/modules/) is
      extracted here.
    required: true
  artifact-name:
    description: Unused. Kept for backward compatibility.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Read Terraform Backend Config
      id: backend
      uses: pagopa/dx/actions/get-terraform-backend-config@poc-store-plan-artifact-in-csp
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Download Plan Bundle from State Storage
      uses: pagopa/dx/actions/cloud-ephemeral-download@poc-store-plan-artifact-in-csp
      with:
        provider: ${{ steps.backend.outputs.provider }}
        source: ${{ steps.backend.outputs.plan-path }}
        extract-to: ${{ inputs.working-directory }}
        azure-storage-account: ${{ steps.backend.outputs.azure-storage-account }}
        azure-container: ${{ steps.backend.outputs.azure-container }}
        aws-bucket: ${{ steps.backend.outputs.aws-bucket }}
        aws-region: ${{ steps.backend.outputs.aws-region }}
