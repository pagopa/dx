name: Cloud Storage Upload
description: >
  Uploads a local file to Azure Blob Storage or Amazon S3.
  Authentication is delegated to the calling workflow (azure/login or
  aws-actions/configure-aws-credentials must have already run).

inputs:
  provider:
    description: Cloud storage provider. Accepted values are "azure" and "aws".
    required: true
  file-paths:
    description: >
      Newline-separated list of files and/or directories to include in the bundle
      (relative to `working-directory`). Mirrors the `path` input of
      `actions/upload-artifact`.
    required: true
  working-directory:
    description: Base directory used to resolve the entries in `file-paths`.
    required: true
  destination:
    description: Remote object path (blob name or S3 object key) for the uploaded bundle.
    required: true
  azure-storage-account:
    description: Azure Storage Account name. Required when provider is "azure".
    required: false
    default: ""
  azure-container:
    description: Azure Blob container name. Required when provider is "azure".
    required: false
    default: ""
  aws-bucket:
    description: S3 bucket name. Required when provider is "aws".
    required: false
    default: ""
  aws-region:
    description: AWS region where the S3 bucket lives. Required when provider is "aws".
    required: false
    default: ""
outputs:
  remote-url:
    description: Full URL of the uploaded object.

runs:
  using: node24
  main: dist/main.cjs
