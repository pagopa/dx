name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes releases on push to the base branch."

inputs:
  github-token:
    description: "Pre-generated GitHub App installation token"
    required: true
  app-slug:
    description: "GitHub App slug associated with github-token"
    required: true
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
outputs:
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    - name: Determine release mode from version plans
      id: release-mode
      shell: bash
      env:
        BEFORE_SHA: ${{ github.event.before }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail

        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "mode=publish-all" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
          echo "mode=warn-pr" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CHANGED_VERSION_PLAN_FILES=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" -- .nx/version-plans | wc -l | tr -d ' ')
        if [[ "$CHANGED_VERSION_PLAN_FILES" == "0" ]]; then
          echo "mode=skip" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        VERSION_PLAN_FILE_COUNT=0
        if [[ -d .nx/version-plans ]]; then
          VERSION_PLAN_FILE_COUNT=$(find .nx/version-plans -type f | wc -l | tr -d ' ')
        fi

        if [[ "$VERSION_PLAN_FILE_COUNT" == "0" ]]; then
          echo "mode=publish" >> "$GITHUB_OUTPUT"
        else
          echo "mode=create-pr" >> "$GITHUB_OUTPUT"
        fi

    # warn-pr only upserts a PR comment. The other modes create commits, tags,
    # or releases, so only they need a Git author identity.
    - name: Resolve GitHub App bot identity
      if: steps.release-mode.outputs.mode == 'create-pr' || steps.release-mode.outputs.mode == 'publish' || steps.release-mode.outputs.mode == 'publish-all'
      id: app-bot
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        bot_login="${APP_SLUG}[bot]"
        bot_user_id="$(gh api "/users/${bot_login}" --jq .id)"

        # Keep the standard GitHub App bot noreply identity so downstream git
        # config produces a single recognizable bot author in PRs and releases.
        echo "login=${bot_login}" >> "$GITHUB_OUTPUT"
        echo "email=${bot_user_id}+${bot_login}@users.noreply.github.com" >> "$GITHUB_OUTPUT"

    # release commits, tags, and GitHub Releases should appear as authored by
    # the GitHub App bot, while the warn-pr path should remain a plain PR comment
    # flow and must not alter the repository git identity.
    - name: Configure Git user
      if: steps.release-mode.outputs.mode == 'create-pr' || steps.release-mode.outputs.mode == 'publish' || steps.release-mode.outputs.mode == 'publish-all'
      shell: bash
      env:
        BOT_LOGIN: ${{ steps.app-bot.outputs.login }}
        BOT_EMAIL: ${{ steps.app-bot.outputs.email }}
      run: |
        git config user.name "$BOT_LOGIN"
        git config user.email "$BOT_EMAIL"

    - name: Warn missing version plan coverage on pull request
      if: steps.release-mode.outputs.mode == 'warn-pr'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        node "$ACTION_PATH/scripts/dist/warn-version-plan-coverage-pr.js"

    - name: Create or update Version Packages PR
      if: steps.release-mode.outputs.mode == 'create-pr'
      id: create-pr
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: "nx-release/main"
        PR_TITLE: "Version Packages"
        COMMIT_MESSAGE: "Version Packages"
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" 2>/dev/null || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        git tag -l | sort > /tmp/nx-tags-before.txt

        npx nx release --preid rc --skip-publish

        # Capture the exact tags Nx just created locally (not pushed yet).
        # comm -13 outputs lines in the second file only = new tags.
        NEW_TAGS=$(comm -13 /tmp/nx-tags-before.txt <(git tag -l | sort) | grep -v '^$' || true)
        rm -f /tmp/nx-tags-before.txt

        # Check if any files changed
        if git diff HEAD --quiet; then
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Resolve tag → project root path via nx (used for changelog extraction and
        # GitHub Release notes). Must run before manage-version-pr so paths are available.
        RELEASE_TAGS=$(NEW_TAGS="$NEW_TAGS" node "$ACTION_PATH/scripts/dist/extract-tags.js")

        # Commit and push the version changes (bump + changelog)
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        if ! git push --force-with-lease origin "$RELEASE_BRANCH" 2>/tmp/nx-release-push.err; then
          cat /tmp/nx-release-push.err >&2

          if grep -Eq 'Permission to .+ denied to .+\[bot\]' /tmp/nx-release-push.err; then
            echo "::error::GitHub App authentication succeeded, but the installation token could not push to ${GITHUB_REPOSITORY}. Check the installation's effective contents:write permission on this repository, make sure any newly granted app permissions were approved on the installation, and verify that no repository ruleset or branch protection blocks pushes to ${RELEASE_BRANCH}." >&2
          fi

          exit 1
        fi
        rm -f /tmp/nx-release-push.err

        # Create or update PR (script writes to GITHUB_OUTPUT)
        RELEASE_TAGS="$RELEASE_TAGS" node "$ACTION_PATH/scripts/dist/manage-version-pr.js"

    - name: Publish with Nx release
      if: steps.release-mode.outputs.mode == 'publish' || steps.release-mode.outputs.mode == 'publish-all'
      id: publish
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        GH_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_MODE: ${{ steps.release-mode.outputs.mode }}
      run: |
        set -euo pipefail

        log_pre_publish_workspace_state() {
          local projects_selector="${1:-}"

          echo "::group::Release publish preflight diagnostics"
          echo "Release mode: $RELEASE_MODE"
          if [[ -n "$projects_selector" ]]; then
            echo "Target projects: $projects_selector"
          fi
          node --version
          pnpm --version
          git status --short --untracked-files=all
          echo "::endgroup::"
        }

        print_json_array_items_from_stdin() {
          node -e '
            const fs = require("fs");
            const stdout = fs.readFileSync(0, "utf8");
            const start = stdout.indexOf("[");
            const end = stdout.lastIndexOf("]");
            if (start === -1 || end === -1 || end < start) {
              console.error("Could not parse `nx show projects --json` output:");
              console.error(stdout);
              process.exit(1);
            }
            const values = JSON.parse(stdout.slice(start, end + 1));
            if (!Array.isArray(values)) {
              console.error("Expected an array from `nx show projects --json`.");
              process.exit(1);
            }
            for (const value of values) {
              console.log(value);
            }
          '
        }

        print_project_root_from_stdin() {
          node -e '
            const fs = require("fs");
            const stdout = fs.readFileSync(0, "utf8");
            const start = stdout.indexOf("{");
            const end = stdout.lastIndexOf("}");
            if (start === -1 || end === -1 || end < start) {
              console.error("Could not parse `nx show project --json` output:");
              console.error(stdout);
              process.exit(1);
            }
            const project = JSON.parse(stdout.slice(start, end + 1));
            if (typeof project.root !== "string" || project.root.length === 0) {
              console.error("Expected a project root from `nx show project --json`.");
              process.exit(1);
            }
            process.stdout.write(project.root);
          '
        }

        log_publish_failure_diagnostics() {
          local projects_selector="$1"
          local project_name=""
          local project_names=""
          local project_root=""

          echo "::group::Release publish failure diagnostics"
          git status --short --untracked-files=all || true
          git diff --stat || true

          if [[ -z "$projects_selector" ]]; then
            echo "No target projects available for pnpm dry-run diagnostics."
            echo "::endgroup::"
            return
          fi

          if ! project_names=$(
            npx nx show projects --projects="$projects_selector" --json \
              | print_json_array_items_from_stdin
          ); then
            echo "::warning::Could not resolve target projects for selector '$projects_selector'."
            echo "::endgroup::"
            return
          fi

          if [[ -z "$project_names" ]]; then
            echo "No target projects resolved for pnpm dry-run diagnostics."
            echo "::endgroup::"
            return
          fi

          while IFS= read -r project_name; do
            if [[ -z "$project_name" ]]; then
              continue
            fi

            if ! project_root=$(
              npx nx show project "$project_name" --json \
                | print_project_root_from_stdin
            ); then
              echo "::warning::Could not resolve root for project '$project_name'."
              continue
            fi

            echo "::group::pnpm publish dry-run for $project_name"
            echo "Project root: $project_root"
            if ! pnpm publish "$project_root" --json --dry-run --no-git-checks; then
              echo "::warning::pnpm publish dry-run failed for project '$project_name'."
            fi
            echo "::endgroup::"
          done <<< "$project_names"

          echo "::endgroup::"
        }

        run_nx_release_publish() {
          local diagnostic_projects_selector="$1"
          shift

          log_pre_publish_workspace_state "$diagnostic_projects_selector"

          if ! npx nx release publish --verbose "$@"; then
            log_publish_failure_diagnostics "$diagnostic_projects_selector"
            return 1
          fi
        }

        if [[ "$RELEASE_MODE" == "publish-all" ]]; then
          # workflow_dispatch: build and publish all public projects (recovery mode)
          npx nx run-many --target=build --projects="tag:*:public"
          run_nx_release_publish "tag:*:public"
        else
          # push mode: extract projects from the latest merged Version Packages PR
          LATEST_PR_NUMBER=$(gh pr list --state merged --base "$BASE_BRANCH" --head "nx-release/main" --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null || true)

          if ! [[ "$LATEST_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not find a merged Version Packages PR on base branch '$BASE_BRANCH'. Push mode requires a merged PR to determine target projects." >&2
            exit 1
          fi

          PROJECTS_TO_BUILD=$(PR_NUMBER="$LATEST_PR_NUMBER" node "$ACTION_PATH/scripts/dist/extract-projects-to-build.js")

          if [[ -n "${PROJECTS_TO_BUILD:-}" ]]; then
            npx nx run-many --target=build --projects="$PROJECTS_TO_BUILD"
            run_nx_release_publish "$PROJECTS_TO_BUILD" --projects="$PROJECTS_TO_BUILD"
          else
            echo "No public projects to publish (all released projects may be private). Skipping build/publish but proceeding to tag/release sync."
          fi
        fi

        echo "published=true" >> "$GITHUB_OUTPUT"

    - name: Sync Git Tags and GitHub Releases
      if: steps.publish.outputs.published == 'true'
      id: tags
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        node "$ACTION_PATH/scripts/dist/sync-tags-releases.js"
