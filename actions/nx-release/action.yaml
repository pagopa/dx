name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes when version PR is merged."

inputs:
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: false
    default: ${{ github.token }}
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
outputs:
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    - name: Configure Git user
      shell: bash
      run: |
        git config user.name "dx-pagopa-bot"
        git config user.email "dx-pagopa-bot@pagopa.it"

    - name: Create or update Version Packages PR
      if: github.event_name == 'push'
      id: create-pr
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: "nx-release/main"
        PR_TITLE: "Version Packages"
        COMMIT_MESSAGE: "Version Packages"
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" 2>/dev/null || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        echo "::notice::Recording existing tags before version bump"
        git tag -l | sort > /tmp/nx-tags-before.txt

        echo "::notice::Executing version command"
        npx nx release --preid rc --skip-publish

        # Capture the exact tags Nx just created locally (not pushed yet).
        # comm -13 outputs lines in the second file only = new tags.
        NEW_TAGS=$(comm -13 /tmp/nx-tags-before.txt <(git tag -l | sort) | grep -v '^$' || true)
        rm -f /tmp/nx-tags-before.txt

        echo "::notice::Refreshing lockfile"
        pnpm install --lockfile-only

        # Check if any files changed
        if git diff HEAD --quiet; then
          echo "::notice::No version changes produced by Nx release. Skipping PR update."
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        PR_BODY=$(node "$ACTION_PATH/scripts/dist/build-pr-body.js")

        # For each tag Nx created, find the corresponding manifest path (used later for
        # CHANGELOG extraction). Manifests are already updated (unstaged) at this point.
        RELEASE_TAGS=$(NEW_TAGS="$NEW_TAGS" node - << 'JSEOF'
        'use strict';
        const { execFileSync, readFileSync } = require('child_process');
        const newTags = (process.env.NEW_TAGS || '').split('\n').filter(Boolean);
        if (newTags.length === 0) { console.log('[]'); process.exit(0); }
        const manifests = execFileSync('git', ['ls-files', '--', '**/package.json', '**/pom.xml'], { encoding: 'utf8' })
          .split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        const entries = [];
        for (const tag of newTags) {
          const atIdx = tag.lastIndexOf('@');
          const name = tag.slice(0, atIdx);
          const version = tag.slice(atIdx + 1);
          let found = null;
          for (const f of manifests) {
            try {
              if (f.endsWith('package.json')) {
                const p = JSON.parse(readFileSync(f, 'utf8'));
                if (p.name === name && p.version === version) { found = f; break; }
              } else {
                const c = readFileSync(f, 'utf8');
                const id = (c.match(/<artifactId>([^<]+)<\/artifactId>/) || [])[1];
                const v  = (c.match(/<version>([^<]+)<\/version>/) || [])[1];
                if (id === name && v === version) { found = f; break; }
              }
            } catch {}
          }
          entries.push({ tag: tag, path: found });
        }
        console.log(JSON.stringify(entries));
        JSEOF
        )
        PR_BODY="${PR_BODY}
        <!-- nx-release-tags: ${RELEASE_TAGS} -->"

        # Commit and push the version changes (bump + changelog)
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        git push --force-with-lease origin "$RELEASE_BRANCH"

        # Create or update PR
        PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number // empty' || true)

        if [[ -n "$PR_NUMBER" ]]; then
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
          echo "::notice::Updated existing release PR #$PR_NUMBER"
        else
          PR_URL=$(gh pr create --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --title "$PR_TITLE" --body "$PR_BODY")
          PR_NUMBER=$(echo "$PR_URL" | sed -E 's|.*/pull/([0-9]+).*|\1|')
          echo "::notice::Created new release PR #$PR_NUMBER"
        fi

        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Publish with Nx release
      if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'nx-release/')
      id: publish
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        echo "::notice::Executing build command before publish"
        npx nx run-many --target=build --projects=tag:npm:public

        echo "::notice::Executing publish command"
        npx nx release publish

        echo "published=true" >> "$GITHUB_OUTPUT"

    - name: Sync Git Tags and GitHub Releases
      if: steps.publish.outputs.published == 'true' || github.event_name == 'workflow_dispatch'
      id: tags
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        # Reads the nx-release-tags metadata saved in the body of every merged
        # "Version Packages" PR. Idempotent: skips tags/releases that already exist.
        # Recovery-capable: scans ALL past merged PRs, so a single workflow_dispatch
        # catches up on every tag missed across multiple failed publish runs.
        node - << 'JSEOF'
        'use strict';
        const { execFileSync, spawnSync } = require('child_process');
        const { readFileSync, existsSync } = require('fs');
        const { dirname, join } = require('path');

        function exec(cmd, args) {
          return execFileSync(cmd, args, { encoding: 'utf8' });
        }
        function run(cmd, args) {
          const r = spawnSync(cmd, args, { stdio: 'inherit' });
          if (r.status !== 0) throw new Error(cmd + ' ' + args.join(' ') + ' exited with code ' + r.status);
        }

        const base = process.env.BASE_BRANCH || 'main';

        // Query all merged Version Packages PRs and collect their tag metadata.
        // Use a Map keyed by tag to deduplicate across PRs (handles multiple bumps of same package).
        const prs = JSON.parse(exec('gh', [
          'pr', 'list', '--state', 'merged', '--head', 'nx-release/main', '--base', base,
          '--limit', '100', '--json', 'number,body',
        ]));
        const allEntries = new Map();
        for (const pr of prs) {
          if (!pr.body) continue;
          const m = pr.body.match(/<!-- nx-release-tags: (\[[\s\S]*?\]) -->/);
          if (!m) continue;
          try {
            for (const e of JSON.parse(m[1])) allEntries.set(e.tag, e);
          } catch {}
        }

        if (allEntries.size === 0) {
          console.log('::notice::No release tags found in merged Version Packages PRs');
          process.exit(0);
        }

        const newTags = [];
        for (const entry of allEntries.values()) {
          const { tag, path } = entry;
          const remote = exec('git', ['ls-remote', '--tags', 'origin', 'refs/tags/' + tag]);
          if (remote.trim()) { console.log('::notice::Tag ' + tag + ' already exists, skipping'); continue; }
          run('git', ['tag', '-a', tag, '-m', 'Release ' + tag]);
          newTags.push(entry);
          console.log('::notice::Created tag: ' + tag);
        }

        if (newTags.length === 0) { console.log('::notice::No new tags to push'); process.exit(0); }

        run('git', ['push', 'origin', '--tags']);

        for (const { tag, path } of newTags) {
          let notes = 'Release ' + tag;
          const clPath = join(dirname(path), 'CHANGELOG.md');
          if (existsSync(clPath)) {
            try {
              const version = tag.slice(tag.lastIndexOf('@') + 1);
              const lines = readFileSync(clPath, 'utf8').split('\n');
              const pat = new RegExp('^##\\s+.*' + version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
              const s = lines.findIndex(function(l) { return pat.test(l); });
              if (s >= 0) {
                const e = lines.findIndex(function(l, i) { return i > s && /^##\s/.test(l); });
                const sec = lines.slice(s, e < 0 ? undefined : e).join('\n').trim();
                if (sec) notes = sec;
              }
            } catch {}
          }
          try { exec('gh', ['release', 'view', tag]); console.log('::notice::GitHub release ' + tag + ' already exists, skipping'); continue; } catch {}
          const args = ['release', 'create', tag, '--title', tag, '--notes', notes];
          if (tag.includes('-')) args.push('--prerelease');
          run('gh', args);
          console.log('::notice::Created GitHub release: ' + tag);
        }
        JSEOF
