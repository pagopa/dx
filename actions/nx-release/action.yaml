name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes releases on push to the base branch."

inputs:
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: false
    default: ${{ github.token }}
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
outputs:
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    - name: Determine release mode from version plans
      id: release-mode
      shell: bash
      env:
        BEFORE_SHA: ${{ github.event.before }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail

        if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "mode=publish-all" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
          echo "mode=warn-pr" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        CHANGED_VERSION_PLAN_FILES=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" -- .nx/version-plans | wc -l | tr -d ' ')
        if [[ "$CHANGED_VERSION_PLAN_FILES" == "0" ]]; then
          echo "mode=skip" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        VERSION_PLAN_FILE_COUNT=0
        if [[ -d .nx/version-plans ]]; then
          VERSION_PLAN_FILE_COUNT=$(find .nx/version-plans -type f | wc -l | tr -d ' ')
        fi

        if [[ "$VERSION_PLAN_FILE_COUNT" == "0" ]]; then
          echo "mode=publish" >> "$GITHUB_OUTPUT"
        else
          echo "mode=create-pr" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure Git user
      if: steps.release-mode.outputs.mode == 'create-pr' || steps.release-mode.outputs.mode == 'publish' || steps.release-mode.outputs.mode == 'publish-all'
      shell: bash
      run: |
        git config user.name "dx-pagopa-bot"
        git config user.email "dx-pagopa-bot@users.noreply.github.com"

    - name: Warn missing version plan coverage on pull request
      if: steps.release-mode.outputs.mode == 'warn-pr'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        node "$ACTION_PATH/scripts/dist/warn-version-plan-coverage-pr.js"

    - name: Create or update Version Packages PR
      if: steps.release-mode.outputs.mode == 'create-pr'
      id: create-pr
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: "nx-release/main"
        PR_TITLE: "Version Packages"
        COMMIT_MESSAGE: "Version Packages"
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" 2>/dev/null || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        git tag -l | sort > /tmp/nx-tags-before.txt

        npx nx release --preid rc --skip-publish

        # Capture the exact tags Nx just created locally (not pushed yet).
        # comm -13 outputs lines in the second file only = new tags.
        NEW_TAGS=$(comm -13 /tmp/nx-tags-before.txt <(git tag -l | sort) | grep -v '^$' || true)
        rm -f /tmp/nx-tags-before.txt

        # Check if any files changed
        if git diff HEAD --quiet; then
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Resolve tag → project root path via nx (used for changelog extraction and
        # GitHub Release notes). Must run before manage-version-pr so paths are available.
        RELEASE_TAGS=$(NEW_TAGS="$NEW_TAGS" node "$ACTION_PATH/scripts/dist/extract-tags.js")

        # Commit and push the version changes (bump + changelog)
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        git push --force-with-lease origin "$RELEASE_BRANCH"

        # Create or update PR (script writes to GITHUB_OUTPUT)
        RELEASE_TAGS="$RELEASE_TAGS" node "$ACTION_PATH/scripts/dist/manage-version-pr.js"

    - name: Publish with Nx release
      if: steps.release-mode.outputs.mode == 'publish' || steps.release-mode.outputs.mode == 'publish-all'
      id: publish
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        GITHUB_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_MODE: ${{ steps.release-mode.outputs.mode }}
      run: |
        set -euo pipefail

        if [[ "$RELEASE_MODE" == "publish-all" ]]; then
          # workflow_dispatch: build and publish all public projects (recovery mode)
          npx nx run-many --target=build --projects="tag:*:public"
          npx nx release publish
        else
          # push mode: extract projects from the latest merged Version Packages PR
          LATEST_PR_NUMBER=$(gh pr list --state merged --base "$BASE_BRANCH" --head "nx-release/main" --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null || true)

          if ! [[ "$LATEST_PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not find a merged Version Packages PR on base branch '$BASE_BRANCH'. Push mode requires a merged PR to determine target projects." >&2
            exit 1
          fi

          PROJECTS_TO_BUILD=$(PR_NUMBER="$LATEST_PR_NUMBER" node "$ACTION_PATH/scripts/dist/extract-projects-to-build.js")

          if [[ -n "${PROJECTS_TO_BUILD:-}" ]]; then
            npx nx run-many --target=build --projects="$PROJECTS_TO_BUILD"
            npx nx release publish --projects="$PROJECTS_TO_BUILD"
          else
            echo "No public projects to publish (all released projects may be private). Skipping build/publish but proceeding to tag/release sync."
          fi
        fi

        echo "published=true" >> "$GITHUB_OUTPUT"

    - name: Sync Git Tags and GitHub Releases
      if: steps.publish.outputs.published == 'true'
      id: tags
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        node "$ACTION_PATH/scripts/dist/sync-tags-releases.js"
