name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes when version PR is merged."

inputs:
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: false
    default: ${{ github.token }}
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
  release-branch:
    description: "Branch used for Version Packages PR"
    required: false
    default: "nx-release/main"
  pr-title:
    description: "Title for the release pull request"
    required: false
    default: "Version Packages"
  pr-body:
    description: "Body for the release pull request"
    required: false
    default: "This PR was generated by Nx release automation."
  commit-message:
    description: "Commit message for generated version bumps"
    required: false
    default: "Version Packages"
  version-command:
    description: "Command used to consume version plans and bump versions"
    required: false
    default: "npx nx release version --yes"
  publish-command:
    description: "Command used to publish after version PR merge"
    required: false
    default: "npx nx release publish --yes"

outputs:
  mode:
    description: "Detected mode for this run: create-pr | publish | noop"
    value: ${{ steps.intent.outputs.mode }}
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  published:
    description: "Whether publish command ran successfully"
    value: ${{ steps.publish.outputs.published || 'false' }}

runs:
  using: "composite"
  steps:
    - name: Detect Nx release intent
      id: intent
      shell: bash
      run: |
        set -euo pipefail

        BEFORE_SHA=$(node -e "const fs=require('fs');try{const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8'));process.stdout.write(e.before||'');}catch{process.stdout.write('');}")
        AFTER_SHA=$(node -e "const fs=require('fs');try{const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8'));process.stdout.write(e.after||process.env.GITHUB_SHA||'');}catch{process.stdout.write(process.env.GITHUB_SHA||'');}")

        if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
          RANGE_BASE="HEAD~1"
          RANGE_HEAD="HEAD"
        else
          RANGE_BASE="$BEFORE_SHA"
          RANGE_HEAD="$AFTER_SHA"
        fi

        echo "::notice::Analyzing diff range $RANGE_BASE..$RANGE_HEAD"
        DIFF_STATUS=$(git diff --name-status "$RANGE_BASE" "$RANGE_HEAD" || true)
        echo "$DIFF_STATUS"

        HAS_PLAN_ADD_MOD=$(echo "$DIFF_STATUS" | grep -E "^[AMR].*\.nx/version-plans?/" || true)
        HAS_PLAN_DELETE=$(echo "$DIFF_STATUS" | grep -E "^[DR].*\.nx/version-plans?/" || true)
        HAS_VERSION_BUMP=$(echo "$DIFF_STATUS" | grep -E "^[AMR].*(package\.json|pom\.xml)$" || true)

        if [[ -n "$HAS_PLAN_ADD_MOD" ]]; then
          echo "mode=create-pr" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected new or updated Nx version plans. Mode: create-pr"
        elif [[ -n "$HAS_PLAN_DELETE" && -n "$HAS_VERSION_BUMP" ]]; then
          echo "mode=publish" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected consumed version plans and version bumps. Mode: publish"
        else
          echo "mode=noop" >> "$GITHUB_OUTPUT"
          echo "::notice::No Nx release action required. Mode: noop"
        fi

    - name: Configure Git user
      if: steps.intent.outputs.mode == 'create-pr'
      shell: bash
      run: |
        git config user.name "dx-pagopa-bot"
        git config user.email "dx-pagopa-bot@pagopa.it"

    - name: Create or update Version Packages PR
      if: steps.intent.outputs.mode == 'create-pr'
      id: create-pr
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: ${{ inputs.release-branch }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        VERSION_COMMAND: ${{ inputs.version-command }}
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        eval "$VERSION_COMMAND"

        git add -A
        if git diff --cached --quiet; then
          echo "::notice::No version changes produced by Nx release version. Skipping PR update."
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git commit -m "$COMMIT_MESSAGE"
        git push --force-with-lease origin "$RELEASE_BRANCH"

        PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number // empty')

        if [[ -n "$PR_NUMBER" ]]; then
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
          echo "::notice::Updated existing release PR #$PR_NUMBER"
        else
          PR_URL=$(gh pr create --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --title "$PR_TITLE" --body "$PR_BODY")
          PR_NUMBER=$(echo "$PR_URL" | sed -E 's|.*/pull/([0-9]+).*|\1|')
          echo "::notice::Created new release PR #$PR_NUMBER"
        fi

        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Publish with Nx release
      if: steps.intent.outputs.mode == 'publish'
      id: publish
      shell: bash
      env:
        PUBLISH_COMMAND: ${{ inputs.publish-command }}
        NPM_CONFIG_PROVENANCE: true
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        eval "$PUBLISH_COMMAND"
        echo "published=true" >> "$GITHUB_OUTPUT"

    - name: Mark not published
      if: steps.intent.outputs.mode != 'publish'
      id: not-published
      shell: bash
      run: |
        echo "published=false" >> "$GITHUB_OUTPUT"
