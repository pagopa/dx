name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes when version PR is merged."

inputs:
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: false
    default: ${{ github.token }}
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
  release-branch:
    description: "Branch used for Version Packages PR"
    required: false
    default: "changeset-release/main"
  pr-title:
    description: "Title for the release pull request"
    required: false
    default: "Version Packages"
  commit-message:
    description: "Commit message for generated version bumps"
    required: false
    default: "chore: version packages"

outputs:
  mode:
    description: "Detected mode for this run: create-pr | publish | noop"
    value: ${{ steps.intent.outputs.mode }}
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  published:
    description: "Whether publish command ran successfully"
    value: ${{ steps.publish.outputs.published || 'false' }}

runs:
  using: "composite"
  steps:
    - name: Detect Nx release intent
      id: intent
      shell: bash
      run: |
        set -euo pipefail

        BEFORE_SHA=$(node -e "const fs=require('fs');try{const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8'));process.stdout.write(e.before||'');}catch{process.stdout.write('');}")
        AFTER_SHA=$(node -e "const fs=require('fs');try{const e=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,'utf8'));process.stdout.write(e.after||process.env.GITHUB_SHA||'');}catch{process.stdout.write(process.env.GITHUB_SHA||'');}")

        if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
          RANGE_BASE="HEAD~1"
          RANGE_HEAD="HEAD"
        else
          RANGE_BASE="$BEFORE_SHA"
          RANGE_HEAD="$AFTER_SHA"
        fi

        echo "::notice::Analyzing diff range $RANGE_BASE..$RANGE_HEAD"
        DIFF_STATUS=$(git diff --name-status "$RANGE_BASE" "$RANGE_HEAD" || true)

        HAS_PLAN_ADD_MOD=$(echo "$DIFF_STATUS" | grep -E "^[AMR].*\.nx/version-plans?/" || true)
        HAS_PLAN_DELETE=$(echo "$DIFF_STATUS" | grep -E "^[DR].*\.nx/version-plans?/" || true)
        HAS_VERSION_BUMP=$(echo "$DIFF_STATUS" | grep -E "^[AMR].*(package\.json|pom\.xml)$" || true)

        if [[ -n "$HAS_PLAN_ADD_MOD" ]]; then
          echo "mode=create-pr" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected new/modified Nx version plans on main. Mode: create-pr"
        elif [[ -n "$HAS_PLAN_DELETE" && -n "$HAS_VERSION_BUMP" ]]; then
          echo "mode=publish" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected consumed version plans and version bumps. Mode: publish"
        else
          echo "mode=noop" >> "$GITHUB_OUTPUT"
          echo "::notice::No Nx release action required. Mode: noop"
        fi

    - name: Configure Git user
      shell: bash
      run: |
        git config user.name "dx-pagopa-bot"
        git config user.email "dx-pagopa-bot@pagopa.it"

    - name: Create or update Version Packages PR
      if: steps.intent.outputs.mode == 'create-pr'
      id: create-pr
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: ${{ inputs.release-branch }}
        PR_TITLE: ${{ inputs.pr-title }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" 2>/dev/null || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        # Run nx release to consume plans, bump versions, and generate changelogs
        echo "::notice::Executing nx release version --no-commit"
        npx nx release --preid rc --skip-publish 2>&1 || true

        echo "🔄 Refreshing pnpm-lock.yaml..."
        pnpm install --lockfile-only

        # Check if any files changed
        if git diff HEAD --quiet; then
          echo "No changes generated by Nx Release. Exiting."
          echo "::notice::No version changes produced by Nx release. Skipping PR update."
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Generate PR body with version changes
        # Extract all CHANGELOG.md files that were modified to build the release summary
        PR_BODY=$(cat << 'EOFBODY'
        This PR was opened by the [Nx Release](https://nx.dev/features/manage-releases) GitHub action. When you're ready to do a release, you can merge this and the packages will be published to npm automatically. If you're not ready to do a release yet, that's fine, whenever you add more version plans to main, this PR will be updated.

        ## 🚀 Releases

        EOFBODY
        )

        # Extract modified CHANGELOG.md files and include versions
        CHANGELOGS=$(git diff --name-only | grep "CHANGELOG.md" || true)
        if [[ -n "$CHANGELOGS" ]]; then
          for changelog in $CHANGELOGS; do
            if [[ -f "$changelog" ]]; then
              echo "Extracting new entry from $changelog..."
              NEW_ENTRY=$(awk '/^## / { if (p) { exit }; p=1; print; next } p { print }' "$changelog")
              if [[ -n "$NEW_ENTRY" ]]; then
                PR_BODY="$PR_BODY"$'\n'"$NEW_ENTRY"$'\n'
              fi
            fi
          done
        else
          PR_BODY="$PR_BODY"$'\n'"No changelog changes detected (version bump only)."
        fi

        # Commit and push the version changes (bump + changelog)
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        git push --force-with-lease origin "$RELEASE_BRANCH"

        # Create or update PR
        PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number // empty' || true)

        if [[ -n "$PR_NUMBER" ]]; then
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
          echo "::notice::Updated existing release PR #$PR_NUMBER"
        else
          PR_URL=$(gh pr create --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --title "$PR_TITLE" --body "$PR_BODY")
          PR_NUMBER=$(echo "$PR_URL" | sed -E 's|.*/pull/([0-9]+).*|\1|')
          echo "::notice::Created new release PR #$PR_NUMBER"
        fi

        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Create Git Tags and GitHub Releases
      if: steps.intent.outputs.mode == 'publish'
      id: tags
      shell: bash
      run: |
        set -euo pipefail

        echo "::notice::Creating tags and releases for published packages"

        TAGS_CREATED=""

        # Support function to create GitHub release with proper handling of pre-releases and idempotency
        create_release() {
          local name=$1
          local version=$2
          local tag_name="${name}@v${version}"

          # Prerelease check (es: 1.0.0-rc.1)
          local prerelease_flag=""
          if [[ "$version" == *"-"* ]]; then
            prerelease_flag="--prerelease"
            echo "::notice::Detected Prerelease version: $version"
          fi

          # Verify if tag already exists
          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "::notice::Tag $tag_name already exists, skipping"
            return
          fi

          echo "::notice::Creating Release & Tag: $tag_name (Pre-release: ${prerelease_flag:-false})"

          # Create GitHub release
          gh release create "$tag_name" \
            --title "$tag_name" \
            --generate-notes \
            $prerelease_flag

          TAGS_CREATED="$TAGS_CREATED $tag_name"
        }

        # --- PROCESS PACKAGE.JSON ---
        while IFS= read -r pkg_file; do
          if [[ ! -f "$pkg_file" ]]; then continue; fi

          PKG_NAME=$(jq -r '.name // empty' "$pkg_file" 2>/dev/null | sed 's/@.*\///g')
          PKG_VERSION=$(jq -r '.version // empty' "$pkg_file" 2>/dev/null)

          if [[ -z "$PKG_NAME" || -z "$PKG_VERSION" || "$PKG_VERSION" == "null" ]]; then continue; fi

          create_release "$PKG_NAME" "$PKG_VERSION"

        done < <(git diff HEAD~1 --name-only | grep -E 'package\.json$' || true)

        # --- PROCESS POM.XML ---
        while IFS= read -r pom_file; do
          if [[ ! -f "$pom_file" ]]; then continue; fi

          PKG_NAME=$(grep -oP '(?<=<artifactId>)[^<]+' "$pom_file" | head -1)
          PKG_VERSION=$(grep -oP '(?<=<version>)[^<]+' "$pom_file" | head -1)

          if [[ -z "$PKG_NAME" || -z "$PKG_VERSION" ]]; then continue; fi

          create_release "$PKG_NAME" "$PKG_VERSION"

        done < <(git diff HEAD~1 --name-only | grep -E 'pom\.xml$' || true)

        # Output
        if [[ -n "$TAGS_CREATED" ]]; then
          echo "tags=$TAGS_CREATED" >> "$GITHUB_OUTPUT"
        else
          echo "::notice::No new tags created."
          echo "tags=" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish with Nx release
      if: steps.intent.outputs.mode == 'publish'
      id: publish
      shell: bash
      env:
        NPM_CONFIG_PROVENANCE: true
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        echo "::notice::Executing nx release publish"

        npx nx run-many --target=build --projects=tag:npm:public

        npx nx release publish

        echo "published=true" >> "$GITHUB_OUTPUT"

