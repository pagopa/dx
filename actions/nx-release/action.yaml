name: "Nx Release Manager"
description: "Creates/updates Version Packages PR from Nx version plans, or publishes when version PR is merged."

inputs:
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions"
    required: false
    default: ${{ github.token }}
  base-branch:
    description: "Base branch where release flow runs"
    required: false
    default: "main"
  release-branch:
    description: "Branch used for Version Packages PR"
    required: false
    default: "nx-release/main"
  pr-title:
    description: "Title for the release pull request"
    required: false
    default: "Version Packages"
  commit-message:
    description: "Commit message for generated version bumps"
    required: false
    default: "Version Packages"

outputs:
  pull-request-number:
    description: "PR number created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: "PR URL created/updated for Version Packages"
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    # Step to detect if the release intent is to create/update a PR or to publish
    # will set output 'mode' to either 'create-pr', 'publish', or 'noop'
    - name: Detect Nx release intent
      id: intent
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        node "$ACTION_PATH/scripts/dist/detect-intent.js"

    - name: Configure Git user
      shell: bash
      run: |
        git config user.name "dx-pagopa-bot"
        git config user.email "dx-pagopa-bot@pagopa.it"

    # Expose the consumer workspace's node_modules so that action scripts can
    # import 'nx/release' at runtime without bundling the entire nx package.
    # GITHUB_WORKSPACE always points to the consumer repo root, which has nx
    # installed as part of the Nx monorepo setup.
    - name: Expose workspace node_modules to action scripts
      shell: bash
      run: echo "NODE_PATH=$GITHUB_WORKSPACE/node_modules" >> "$GITHUB_ENV"

    - name: Create or update Version Packages PR
      if: steps.intent.outputs.mode == 'create-pr'
      id: create-pr
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        RELEASE_BRANCH: ${{ inputs.release-branch }}
        PR_TITLE: ${{ inputs.pr-title }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        # nx-release-version.js writes the PR body here
        PR_BODY_PATH: ${{ runner.temp }}/nx-release-pr-body.md
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git fetch origin "$BASE_BRANCH" "$RELEASE_BRANCH" 2>/dev/null || true
        git checkout -B "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

        # Runs releaseVersion + releaseChangelog via Nx programmatic API.
        # Writes PR body to $PR_BODY_PATH only when version changes are detected.
        node "$ACTION_PATH/scripts/dist/nx-release-version.js"

        # PR_BODY_PATH is non-empty only when there are actual version changes
        if [[ ! -s "$PR_BODY_PATH" ]]; then
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "::notice::Refreshing lockfile"
        pnpm install --lockfile-only

        # Commit and push the version changes (bump + changelog)
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        git push --force-with-lease origin "$RELEASE_BRANCH"

        # Create or update PR
        PR_NUMBER=$(gh pr list --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number // empty' || true)
        PR_BODY=$(cat "$PR_BODY_PATH")

        if [[ -n "$PR_NUMBER" ]]; then
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
          echo "::notice::Updated existing release PR #$PR_NUMBER"
        else
          PR_URL=$(gh pr create --base "$BASE_BRANCH" --head "$RELEASE_BRANCH" --title "$PR_TITLE" --body "$PR_BODY")
          PR_NUMBER=$(echo "$PR_URL" | sed -E 's|.*/pull/([0-9]+).*|\1|')
          echo "::notice::Created new release PR #$PR_NUMBER"
        fi

        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Publish packages, create git tags and GitHub releases
      if: steps.intent.outputs.mode == 'publish'
      id: publish
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        NPM_CONFIG_PROVENANCE: true
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        echo "::notice::Executing build command before publish"
        npx nx run-many --target=build --projects=tag:npm:public

        # Runs releasePublish via Nx programmatic API then creates git tags
        # and GitHub releases for every successfully published package.
        node "$ACTION_PATH/scripts/dist/nx-release-publish.js"
