name: OpEx Dashboard Generate
description: Generate Azure Dashboard Terraform from OpenAPI specifications
author: PagoPA

branding:
  icon: bar-chart-2
  color: blue

inputs:
  config_pattern:
    description: |
      Glob pattern(s) to find dashboard config files. Supports multiple patterns (one per line).
      Examples:
        Single: 'infra/dashboards/**/config.yaml'
        Multiple: |
          infra/dashboards/**/config.yaml
          .opex/**/config.yaml
    required: true
  opex_dashboard_version:
    description: "Version of @pagopa/opex-dashboard to use"
    required: false
    default: "0.2.0"
  base_ref:
    description: "Base git reference for change detection. Leave empty for auto-detection from GitHub event context."
    required: false
    default: ""
  package_manager:
    description: "Package manager to use (npm, pnpm, yarn)"
    required: false
    default: "npm"

outputs:
  has_changes:
    description: "Whether any dashboard changes were detected"
    value: ${{ steps.extract-dirs.outputs.has_changes }}
  changed_dashboards:
    description: "JSON array of changed dashboard config paths"
    value: ${{ steps.detect.outputs.changed_dashboards }}
  changed_directories:
    description: "JSON array of directories containing generated Terraform files"
    value: ${{ steps.extract-dirs.outputs.changed_directories }}
  artifacts_path:
    description: "Path to collected Terraform artifacts directory (for upload)"
    value: ${{ steps.collect.outputs.artifacts_path }}

runs:
  using: composite
  steps:
    - name: Resolve base reference
      id: resolve-ref
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_BASE_REF: ${{ inputs.base_ref }}
        INPUT_EVENT_NAME: ${{ github.event_name }}
        INPUT_EVENT_BEFORE: ${{ github.event.before }}
        INPUT_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        INPUT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        "${ACTION_PATH}/resolve-base-ref.sh" \
          --base-ref "${INPUT_BASE_REF}" \
          --event-name "${INPUT_EVENT_NAME}" \
          --event-before "${INPUT_EVENT_BEFORE}" \
          --pr-base-sha "${INPUT_PR_BASE_SHA}" \
          --default-branch "${INPUT_DEFAULT_BRANCH}"

    - name: Detect modified configs and OpenAPI specs
      id: detect
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_CONFIG_PATTERN: ${{ inputs.config_pattern }}
        INPUT_BASE_REF: ${{ steps.resolve-ref.outputs.base_ref }}
      run: |
        "${ACTION_PATH}/detect-changes.sh" \
          --config-pattern "${INPUT_CONFIG_PATTERN}" \
          --base-ref "${INPUT_BASE_REF}"

    - name: Generate Terraform for changed dashboards
      id: generate
      if: fromJson(steps.detect.outputs.changed_dashboards)[0] != null
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_CHANGED_DASHBOARDS: ${{ steps.detect.outputs.changed_dashboards }}
        INPUT_OPEX_VERSION: ${{ inputs.opex_dashboard_version }}
        INPUT_PACKAGE_MANAGER: ${{ inputs.package_manager }}
      run: |
        "${ACTION_PATH}/generate-terraform.sh" \
          --changed-dashboards "${INPUT_CHANGED_DASHBOARDS}" \
          --opex-version "${INPUT_OPEX_VERSION}" \
          --package-manager "${INPUT_PACKAGE_MANAGER}"

    - name: Extract changed directories
      id: extract-dirs
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: "${ACTION_PATH}/extract-directories.sh"

    - name: Collect Terraform artifacts
      id: collect
      if: steps.extract-dirs.outputs.has_changes == 'true'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_CHANGED_DIRS: ${{ steps.extract-dirs.outputs.changed_directories }}
      run: |
        "${ACTION_PATH}/collect-artifacts.sh" \
          --changed-dirs "${INPUT_CHANGED_DIRS}"
