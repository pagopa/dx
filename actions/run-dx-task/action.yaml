name: Run DX Task
description: Dispatches DX task

inputs:
  task:
    description: Task name to run.
    required: true
  payload:
    description: JSON payload passed to the selected task.
    required: true

outputs:
  result:
    description: JSON-serialized result returned by the dispatched task.

runs:
  using: node24
  main: dist/index.mjs
