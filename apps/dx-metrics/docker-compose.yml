services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dxmetrics
      POSTGRES_PASSWORD: dxmetrics
      POSTGRES_DB: dxmetrics
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dxmetrics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
